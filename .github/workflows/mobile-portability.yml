name: mobile-portability

on:
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:

concurrency:
  group: mobile-portability-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  compile-only:
    name: compile-only (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-ios
          - aarch64-apple-ios-sim
          - aarch64-linux-android

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check mobile-target libraries
        run: >
          cargo check --locked --lib --target ${{ matrix.target }}
          -p flotsync_core
          -p flotsync_data_types
          -p flotsync_messages
          -p flotsync_replication
          -p flotsync_utils
