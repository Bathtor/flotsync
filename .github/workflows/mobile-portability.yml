name: mobile-portability

on:
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:

concurrency:
  group: mobile-portability-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  compile-only:
    name: compile-only (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-ios
            runner: macos-latest
          - target: aarch64-apple-ios-sim
            runner: macos-latest
          - target: aarch64-linux-android
            runner: ubuntu-latest
          - target: i686-unknown-linux-gnu
            runner: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub auth for git dependencies
        run: >
          git config --global
          url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf
          "https://github.com/"

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Install Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.67.0
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Android C toolchain
        if: matrix.target == 'aarch64-linux-android'
        run: |
          ndk_bin="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CC_aarch64_linux_android=$ndk_bin/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$ndk_bin/llvm-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ndk_bin/aarch64-linux-android21-clang" >> "$GITHUB_ENV"

      - name: Install i686 C toolchain
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-multilib libc6-dev-i386

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check portability-target libraries
        run: >
          cargo check --locked --lib --target ${{ matrix.target }}
          -p flotsync_core
          -p flotsync_udpour
          -p flotsync_data_types
          -p flotsync_messages
          -p flotsync_replication
          -p flotsync_utils
