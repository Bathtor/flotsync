title = "Define transactional ReplicationStore boundary for the first replication slice"
body = """
Expand ReplicationStore from identity/schema lookup into an object-safe, async-safe transaction boundary for the first replication slice. Cover replication group metadata, canonical members and member indices, version vectors, dataset snapshot access, persisted dataset update records, and schema lookup that can return either shared Arc-backed schemas or static schemas. Keep the scope deliberately to the current replication runtime needs rather than the full long-term storage abstraction.

## Acceptance Criteria

A concrete trait and DTO shape exists for first-slice replication state, transaction semantics are explicit about read-your-own-writes plus commit/rollback, and the schema source can represent Arc or &'static schemas without forcing extra cloning."""
