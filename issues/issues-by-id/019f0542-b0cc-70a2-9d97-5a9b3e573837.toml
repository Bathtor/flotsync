title = "Use production key provisioning in setup-boundary tests"
body = """
Production key provisioning and store-native replicated-checklist setup are already in place, and active JWKS code/config has been removed. This task is now limited to improving test coverage at setup boundaries rather than replacing deterministic fixtures wholesale.

Scope:
S01. Keep deterministic test-security helpers for narrow unit tests, low-level store/security tests, and malformed or partial-state scenarios where the production provisioning API would hide the intended setup.
S02. Identify runtime/integration tests where the behaviour under test includes application-side provisioning or runtime loading from provisioned records.
S03. For those setup-boundary tests, arrange fixtures through `provision_replication_security` and caller-supplied `ReplicationSecuritySecrets` so drift between provisioning and runtime loading is caught.
S04. Leave broader removal of `provision_test_security`, deterministic keys, or malformed-state helpers out of scope unless a specific test no longer needs them.

Done when the test suite has explicit production-provisioning coverage for runtime loading/setup-boundary flows, and existing deterministic fixtures are documented or retained for true unit-test and malformed-state coverage."""
