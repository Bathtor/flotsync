id = "019f51c0-4c99-72f3-ab68-fc5fa752a914"
ref = "flotsync-git-pow.5"
title = "Validate and document inline migration policy flow"
body = """
Validate and document the implemented inline-snapshot membership-migration policy flow without duplicating the broad runtime coverage completed in flotsync-git-pow.4.

Scope:
P01. Extract the top-level membership-delta policy derivation into a pure runtime helper after existing persisted-group loading and membership validation.
P02. Cover epoch-only, member-added, member-removed, replacement, and most-restrictive decision behaviour.
P03. Add concise API contract tests for PolicyDecision ordering and the exact defaults of GroupInvitationPolicy and GroupMigrationPolicy.
P04. Rely on runtime behaviour tests for snapshot-fetch classification; do not retain a tautological API test that merely reconstructs both pending-work record forms.
P05. Extend runtime metadata rejection coverage to MigrationProposal: acceptance fails before activation, pending work and inactive material are removed, and the target group remains hidden.
P06. Add accepted MigrationProposal startup-resume coverage, including target-group activation, no repeated listener mediation, and pending-work cleanup.
P07. Retain and reference existing coverage for decision replay, listener failure, automatic-acceptance crash recovery, global read tokens, inline row events, SQLite lifecycle transitions, and three-runtime proposal/invitation delivery.
P08. Keep ReplicationApi and responder Rustdoc focused on the caller-visible membership-change contract; remove Empty-versus-Inline implementation detail and add a conventional Errors section.
P09. Document that device-level migration classifications, local-member removal, and GroupClosePolicy are reserved for later flows and are not consumed by the current inline proposal path.
P10. Update communication and single-recipient delivery protocol documents for the positive self-contained invitation/proposal setup shape and concrete recipient acknowledgement semantics: a message was processed and does not require retry after rejection, stored listener mediation, or committed activation.
P11. Add an OKF state-machine document for validation, policy selection, pending decision, accepted activation, activation, restart, snapshot forms, and explicit deferrals or known gaps.
P12. Regenerate docs/index.md and validate the OKF corpus.

Explicit boundaries and discovered work:
P13. The standalone GroupClose API, which closes a group without creating a replacement, remains flotsync-git-lg9.
P14. Device-level member classification remains outside this slice.
P15. Chunked or fetched Metadata snapshot activation remains outside this slice.
P16. No membership-change steps are added to the replicated-checklist manual because that application does not expose the required commands.
P17. Old-group read-only and inactive transitions are required migration behaviour but are missing from the current implementation. Implement them next in flotsync-git-03f, a child of flotsync-git-pow. Application-facing deactivation exposure remains related to flotsync-git-pvp and flotsync-git-os1.

Review refinements:
P18. Describe only protocol shapes that exist; do not document an absent standalone bootstrap message.
P19. Replace vague local-processing-boundary terminology with processed-and-no-retry wording.
P20. Generate policy-order combinations from the expected restrictiveness instead of spelling out the full matrix.
P21. Describe the policy helper as deriving a decision from membership differences.
P22. Do not claim the missing old-group lifecycle behaviour in public Rustdoc; track it explicitly through flotsync-git-03f.

Validation:
P23. Run focused policy, metadata, and restart tests.
P24. Run cargo fmt, pedantic Clippy, the Rust instruction audit, and the complete serial flotsync_replication test suite.
P25. Run amm scripts/okf-docs.sc generate-index and amm scripts/okf-docs.sc check.

Estimate:
P26. Policy helpers and unit tests: roughly 60-110 LOC after removing redundant coverage.
P27. Metadata and restart tests: roughly 120-220 LOC.
P28. API Rustdoc corrections: roughly 20-45 LOC.
P29. Protocol and state-machine documentation: roughly 180-300 LOC.
P30. Total expected churn: roughly 380-675 LOC, below 1000 LOC."""
