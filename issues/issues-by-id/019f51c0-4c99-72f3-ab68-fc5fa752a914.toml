title = "Validate and document inline migration policy flow"
body = """
Add focused validation and documentation coverage for the inline-snapshot migration policy implementation.

Scope:
A. Unit tests for policy classification and safe defaults.
B. Store/restart tests for pending decision replay and accepted activation resume.
C. Runtime tests for GroupInvitation, MigrationProposal, GroupClose, and inline initial_snapshot activation.
D. Tests that Metadata-only snapshots are represented but not activated until non-inline snapshot transfer exists.
E. Update protocol/API/scenario docs to match implemented inline behaviour.

Out of scope:
F. Dynamic checklist product workflow changes beyond documentation hooks.
G. Chunked snapshot transfer tests."""
