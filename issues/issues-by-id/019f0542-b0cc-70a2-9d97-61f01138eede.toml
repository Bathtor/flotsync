title = "Reduce HPKE encapsulated-key conversion churn"
body = "Follow-up from flotsync_security review. The public HpkeCiphertext type now stores the fixed-width DHKEM(X25519, HKDF-SHA256) encapsulated key as a 32-byte array and exposes typed from_parts/into_parts helpers. Remaining work, if this still proves worth doing, is to centralise the upstream hpke Serializable/Deserializable conversion helpers and profile whether avoiding the HPKE ciphertext Vec returned by the library is worth a larger API change."
