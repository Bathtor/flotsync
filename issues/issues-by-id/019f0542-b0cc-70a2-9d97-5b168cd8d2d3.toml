id = "019f0542-b0cc-70a2-9d97-5b168cd8d2d3"
ref = "flotsync-bhd"
title = "Support multi-fragment linear string updates in one publish"
body = "Discovered while testing flotsync-0ns. A sparse field update from one linear_string value to another can fail with LinearStringDiff::IdsExhausted when the text diff requires more than one inserted fragment, because modify_row currently gives linear_diff only one major operation id. This is independent of read-token rebasing but affects real checklist edits with non-trivial rename/text changes. Design a way to allocate/address multiple inserted fragments within one replicated update without breaking UpdateId/read_versions semantics."
status = "closed"
status_reason = "Fixed multi-fragment linear string updates and added reserved-index regression coverage"
type = "bug"
priority = 2
