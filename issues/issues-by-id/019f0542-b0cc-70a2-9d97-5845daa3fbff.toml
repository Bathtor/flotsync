title = "Make egress reservations growable or hint-based for send_with-style APIs"
body = "The new TcpSessionRef::send_with API currently requires callers to provide a hard upper bound for the serialized payload size. Revisit the egress reservation/write_with API so callers can treat the size as an optional hint or allow automatic growth during serialization without manual retry bookkeeping. This should preserve backpressure and fairness semantics while making the high-level send helpers significantly simpler to use correctly."
