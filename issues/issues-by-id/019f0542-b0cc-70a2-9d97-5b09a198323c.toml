title = "Protect local identity JWKS files with passphrases"
body = """
Follow-up after the flotsync_security MVP: add passphrase-protected local identity files or an equivalent local secret protection mechanism. The design should decide whether to use encrypted JWK/JWE, age-like wrapping, OS keychain integration, or another approach, and should cover CLI prompts, non-interactive configuration, and test support.

## Acceptance Criteria

Local private identity material can be stored encrypted at rest with a documented unlock path; replicated-checklist or future CLIs can load protected identities; and tests cover wrong passphrase, successful unlock, and unprotected test fixtures."""
