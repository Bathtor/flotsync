title = "Implement direct protobuf conversions for schema operations"
body = """
Implement direct protobuf message conversions for SchemaOperation<UpdateId> and OperationValue<UpdateId> across the full datamodel operation surface, including history-backed and state-based field variants.

## Acceptance Criteria

1) Protobuf conversions cover LatestValueWins, LinearString, LinearList, MonotonicCounter, TotalOrderRegister, and TotalOrderFiniteStateRegister operation variants. 2) LinearString and LinearList insert and delete forms are both represented. 3) The helpers validate or preserve enough structure to roundtrip back into the datamodel operation APIs."""
