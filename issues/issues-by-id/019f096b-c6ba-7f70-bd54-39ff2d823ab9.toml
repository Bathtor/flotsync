author = "lkroll"
body = """
Resolved as implementation work in flotsync-ist.8.

Decision summary:
PI01. Public key bundles are Flotsync-owned protobuf binary payloads.
PI02. Live APIs expose canonical raw bytes and typed values; an auxiliary stateless API provides the recommended pasteable text form.
PI03. The recommended text form is pure base64 of PublicKeyBundle bytes, with no flotsync-key-v1 prefix.
PI04. PublicKeyBundle is compact key material only: format version, Ed25519 signing public key, X25519 HPKE/KEM public key, and scheme identifiers.
PI05. PublicKeyBundle does not carry MemberIdentity, display metadata, application id, policy hints, requested authority, or trust source.
PI06. Fingerprints are canonically derived from semantic bundle fields with domain separation, not stored in the bundle and not computed from arbitrary protobuf bytes.
PI07. Multiple fingerprints per identity are allowed, and the same fingerprint may be bound to multiple identities. Trust/evidence is always for an exact MemberIdentity plus fingerprint pair.
PI08. Decode/inspect APIs may report zero, one, or many known identity bindings and must not reject ambiguous bindings.
PI09. Trust/evidence recording APIs require explicit MemberIdentity by API shape. Decoding or importing a bundle does not grant authority.
PI10. Authority remains derived by policy from stored trust/evidence records.
PI11. flotsync-ist.1.1 and flotsync-ist.1.10 were updated to treat these decisions as settled inputs."""
