id = "019f096b-c6ba-7f70-bd54-39ff2d823ab9"
ref = "flotsync-ist.1.2"
title = "Design pasteable key invite format"
body = """
Design a pasteable/shareable key invite format for applications that want text, links, files, or copy-paste flows instead of QR-specific UI.

Questions:
Q01. Should Flotsync prescribe one interoperable string format, expose canonical bytes, or support both?
Q02. How should versioning, feature flags, and algorithm identifiers be represented so old and new Flotsync versions fail safely?
Q03. Should the same bundle format be reused for QR and pasteable invites?
Q04. What fields are mandatory for accepting trust, and which are display-only convenience metadata?
Q05. How should the format represent parent/device identities so applications can show exactly which identity is being trusted?"""
