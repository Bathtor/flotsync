title = "Audit signed-payload-only selector pattern"
body = """
Investigate whether the signed-payload-only selector pattern introduced for route-establishment IntroductionClaimPayloads should be applied to other signed protocol messages.

Scope:
- Review signed payloads that currently duplicate selector or routing metadata inside and outside the signed bytes.
- Identify where selectors can safely live only inside the signed payload and be extracted through conservative borrowed-view decoding before signature verification.
- Exclude encrypted payloads unless their authenticated plaintext/signature structure provides the same property; this pattern is not generally applicable to encrypted-only messages.
- Preserve cheap rejection fields where they are useful and not security-sensitive, unless removing them simplifies the wire contract without losing observability.
- Review signed-payload view decoders for reusable conservative buffa DecodeOptions helpers, so new untrusted-view decoding does not reinvent recursion, unknown-field, and size limits.

Outcome should be a short design recommendation plus follow-up implementation tasks where worthwhile."""
