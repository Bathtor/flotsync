title = "Implement migration proposal runtime with inline snapshots"
body = """
Implement the runtime flow for migration proposals and migration-derived group invitations using Empty or Inline initial snapshots.

Scope:
A. Implement change_group_membership proposal emission for the inline-snapshot slice.
B. Deliver MigrationProposal to existing members and GroupInvitation with Migration source to newly added members.
C. Validate old-group scoped proposal authority and new-group security material.
D. Acknowledge join after user/policy acceptance while delaying activation until initial_snapshot resolution.
E. Activate groups from Empty or Inline snapshots.
F. Reject or defer Metadata-only activation until non-inline snapshot fetching exists.
G. Apply local group-close policy after accepted migration activation.

Out of scope:
H. Chunked snapshot fetch/resume.
I. Dynamic checklist UI/REPL integration."""
