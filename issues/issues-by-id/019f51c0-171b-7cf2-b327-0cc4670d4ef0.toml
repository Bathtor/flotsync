id = "019f51c0-171b-7cf2-b327-0cc4670d4ef0"
ref = "flotsync-git-pow.4"
title = "Implement migration proposal runtime with inline snapshots"
body = """
Implement the runtime flow for migration proposals and migration-derived group invitations using Empty or Inline initial snapshots.

Agreed scope:
P01. Add runtime and wire delivery support for MigrationProposal and migration-sourced GroupInvitation at the existing dispatch boundaries.
P02. Implement change_group_membership for the inline-snapshot slice: compute the new member set, prepare new-group security material, snapshot old-group rows, activate the new local group, and build outbound proposal/invitation payloads.
P03. Send MigrationProposal to continuing old-group members in the old-group authority context, and send GroupInvitation with Migration source to newly added members in the new-group context.
P04. Make GroupInvitation and MigrationProposal self-contained setup messages. Each wire payload carries the private target-group security/bootstrap material needed by its recipient; the standalone BootstrapGroup runtime message is removed.
P05. Keep raw group keys and exact setup details out of listener-visible public invitation/proposal values. Inbound handling verifies setup material, seals the group key for local storage, and persists prepared group material atomically with pending work.
P06. Apply the configured invitation/proposal policy and reject Metadata-only snapshots until non-inline snapshot fetching exists.
P07. Activate InitialSnapshot::Empty by creating the new active group without row embedding.
P08. Activate InitialSnapshot::Inline by embedding projected rows into deterministic initial CRDT state in the new group namespace.
P09. Emit listener DataChanged upserts for rows created by activation. Empty activation emits no row-change event.
P10. Do not emit synthetic old-group deletes in this slice. Old-group lifecycle and access semantics remain deferred.
P11. Resume accepted Empty/Inline activations on startup without asking the listener again.
P12. Listener read tokens emitted by activation contain progress for every active group represented in application state.

Storage design:
P13. Normalise member bindings, schemas, local member index, and encrypted group security material into one group-material table family.
P14. Represent external activation with a small active-group marker containing the version vector. Material without the marker is hidden; datasets and updates remain foreign-keyed to the active marker.
P15. Persist verified inactive material and pending invitation/proposal work atomically. Acceptance inserts the active marker while embedding rows and removes pending work in the same transaction. Rejection removes pending work and inactive material.
P16. Replace pending_group_decisions and pending_group_activations with one pending_group_work table keyed by new_group_id and an explicit decision/activation state.
P17. Accept exact idempotent replay and matching decision-to-activation transitions; reject conflicting work for an occupied target group.
P18. Provide keyed Option loads for listener decisions and group-targeted activations; retain all-record loads only for startup replay.
P19. Use named stored pending-payload row types rather than tuple plumbing.
P20. Put a high-level design comment near the SQLite schema/helpers describing group material, active markers, and pending work before the individual SQL statements.

Runtime and allocation review fixes:
P21. Derive proposed membership with HashSet operations. The local member is index zero; remaining order is arbitrary but fixed for the new group.
P22. Store continuing and added proposed-member indices in RoaringBitmap values. Iterate set indices and point-lookup recipients in the canonical bootstrap member slice.
P23. Encode one proposal and one invitation payload before local activation, consume the original prepared snapshot for embedding, and clone only shared Bytes per recipient after commit.
P24. Apply the same encode-once fan-out principle to creation invitations.
P25. Use RowValues::from_row for snapshot projection and InMemoryStateData::from_initial_value_rows for embedding in the dedicated runtime pending_group module.
P26. Scan inline snapshots once per dataset with usize::MAX until the Metadata threshold path exists.
P27. Stream store patches per dataset inside the activation transaction; retain one post-commit listener event for consistency in this slice.
P28. Add TODO(flotsync-git-vy1) at the embedding boundary that temporarily holds multiple full-row representations.
P29. Use shared membership-validation, snapshot-capture, and activation cause errors wrapped by operation-specific outer errors.
P30. Preserve compact version-vector encoding shapes and retain TODO(flotsync-git-i20) at blocked borrowed-view decode boundaries.
P31. Keep the previously agreed role-based runtime constructor inputs and API-owned pending-record/policy semantics.

Tests and explicit deferrals:
P32. Add focused tests for self-contained proposal/invitation codecs, removal of standalone bootstrap dispatch, recipient classification, encode-once fan-out, policy handling, restart, Empty/Inline activation, listener rows, complete read tokens, pending target uniqueness, state transitions, and inactive-material isolation.
P33. GroupClose protocol and old-group lifecycle/access semantics are deferred to flotsync-git-lg9.
P34. Application-facing de-duplication across group changes is deferred to flotsync-git-pvp.
P35. Memory-bounded post-commit activation listener batching and change-set rederivation are deferred to flotsync-git-os1.
P36. Chunked or fetched snapshot transfer remains out of scope.
P37. Broader snapshot/storage batching redesign remains in flotsync-git-vy1.

Implementation estimate:
P38. Protocol/runtime ownership, sparse dispatch, read tokens, and errors: roughly 350-650 LOC of churn.
P39. SQLite normalisation, store API changes, and storage tests: roughly 550-900 LOC of churn.
P40. Integration and codec tests: roughly 150-300 LOC of churn.
P41. Total likely 1050-1850 LOC. Implement in internal runtime and storage phases, but deliver as one coherent review pass.

Post-full-review correctness fixes:
P42. Keep compact MigrationProposal final-version encoding unchanged. Add a precise TODO(flotsync-git-i20) at the inbound empty-context decode boundary documenting that Synced and Override forms currently fail, and require coverage for both forms in that follow-up.
P43. Make self-contained group-setup replay semantically idempotent. Check cheap group id, member binding, local index, and schema invariants before decrypting; compare the existing plaintext group key with the received setup key; reuse existing encrypted material on a match and seal only for first insertion.
P44. Resolve pending-group policy before the first pending-work commit. AutoReject stores no pending work, AskListener atomically stores inactive material plus decision state, and AutoAccept atomically stores inactive material plus activation state before activation side effects.
P45. Classify proposed recipients directly into RoaringBitmap indices while consuming the final HashSet, without temporary continuing/added identity sets.
P46. Add regression coverage for semantic setup replay, crash-consistent policy state, and continuing-versus-added remote fan-out. Compact Synced/Override proposal delivery tests remain explicitly deferred to flotsync-git-i20.

Additional review refinements:
P47. Rename fallible invitation/proposal wire constructors to try_new.
P48. Retain only added_member_indices and derive continuing recipients as its complement over remote proposed-member indices.
P49. Move reusable group-definition comparison semantics onto the API record types and remove component-local field comparisons.
P50. Rename local values holding work awaiting listener mediation to pending_work/work without broad public record-type churn.
P51. Explicitly validate that the old hosted group already contains the local member before applying membership request sets; index zero remains outside the explicitly remote dispatch domain.
P52. Document the two-phase inbound setup boundary: security validation may perform independent store work, component handling is serial, and the later write transaction revalidates exact material and target-keyed pending work.
P53. Use SmallVec<[ListenerDataChanges; 1]> for listener event-batch collections.
P54. Rename and document SQLite pending-work states as awaiting a decision versus accepted activation, retaining stable SQL strings, and parse them through TryFrom<String>.
P55. Move roaring to workspace dependencies for replication and UDPour, and consume the existing workspace smallvec dependency from replication.
P56. Update focused tests and rerun formatting, pedantic Clippy, the Rust instruction audit, and the complete serial replication suite.

Additional review estimate:
P57. Constructor and terminology updates: roughly 15-30 LOC of churn.
P58. Recipient representation and invariant checks: roughly 45-90 LOC of churn.
P59. API comparison consolidation, listener SmallVec, SQLite state parsing, manifests, and tests: roughly 80-150 LOC of churn.
P60. Total likely 140-270 LOC, remaining well below 1000 LOC."""
