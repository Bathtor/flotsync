title = "Design relay-assisted key store discovery"
body = """
Design relay-assisted public key discovery where relays may act as key stores similar to public keyservers.

Questions:
Q01. Are relay-stored keys only untrusted observations, or can relays be configured as trusted introducers?
Q02. What upload, lookup, freshness, deletion, and abuse-resistance properties are required?
Q03. How does a local policy distinguish a key learned from a relay from one learned through direct discovery or user pairing?
Q04. Can relay key storage be optional without fragmenting interoperability?
Q05. Should relay lookup support parent identities, exact device identities, or both, and how does that affect trust inheritance?"""
