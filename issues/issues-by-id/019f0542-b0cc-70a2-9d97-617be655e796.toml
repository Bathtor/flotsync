title = "Benchmark a columnar HistorySnapshot format against the current node-oriented encoding"
body = """
Once the baseline protobuf snapshot encoder/decoder exists, add an alternative HistorySnapshot storage format that stores node metadata columnar-style and packs node payloads into shared value arrays recoverable from the metadata. Benchmark the baseline and alternative formats against each other for encoded size plus encode/decode performance on representative history snapshots, and capture the tradeoffs and recommendation.

## Acceptance Criteria

1) An alternative HistorySnapshot representation is prototyped for benchmarking, using columnar node metadata plus shared value storage. 2) Benchmarks compare the baseline and alternative snapshot formats for encoded size and encode/decode performance on representative datasets. 3) Results are recorded with a clear comparison and recommendation on whether to keep, discard, or further iterate on the columnar format."""
