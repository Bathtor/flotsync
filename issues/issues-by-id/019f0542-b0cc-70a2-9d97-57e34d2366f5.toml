title = "Design single-recipient durable delivery and relay mailbox protocol"
body = "Define a top-level protocol abstraction for durable delivery to one specific recipient outside normal GroupBroadcast fan-out. This is needed for bootstrap flows such as new-group establishment before a shared group key exists. Specify the relay-assisted mailbox mechanism needed to store and forward recipient-addressed encrypted payloads, how sender/recipient identity and retrieval work, how this interacts with later GroupBroadcast/Replication flows, and what delivery and persistence guarantees are required."
