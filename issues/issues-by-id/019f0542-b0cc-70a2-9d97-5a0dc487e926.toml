title = "Add configurable socket reuse option for announcement socket setup."
body = """
Evidence: `flotsync_discovery/src/services/peer_announcement.rs:62`

## Design

Agreed design for configurable discovery bind reuse: S01 flotsync_io owns the actual bind-time socket option because address/port reuse must be set before bind, not through post-bind UdpSocketOption. S02 Add per-request UDP bind options to flotsync_io, defaulting to reuse disabled, and thread them through UdpRequest::Bind and UdpRequest::Connect to the raw driver bind path. S03 Existing driver-wide bind_reuse_address and flotsync.io.bind-reuse-address remain overrides; effective reuse is driver/global reuse OR request reuse. S04 PeerAnnouncementComponent reads a flotsync_discovery Kompact config value for bind reuse rather than adding another Options field. S05 The discovery bind reuse config defaults to true so multiple local Flotsync applications can bind the agreed custom discovery protocol port. S06 Enshrine 52156 as the default custom UDP announcement/listen port by making it the default bind port as well as the advertised/broadcast port. S07 CLI and future runtime users should get the default discovery behaviour without special setup; tests can override the Kompact config to false.

## Acceptance Criteria

flotsync_io exposes per-request UDP bind options for Bind and Connect; per-request reuse reaches the driver and composes with the existing global reuse override; PeerAnnouncementComponent reads a documented flotsync_discovery Kompact config key defaulting to true; the announcement component binds to the default custom UDP protocol port 52156 by default; tests cover per-request reuse in flotsync_io and default/overridden discovery bind options."""
