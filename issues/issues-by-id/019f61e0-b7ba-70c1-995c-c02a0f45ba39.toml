body = "Implemented value-interface rework: data-types now has operation-id-free RowValueRead, RowOperations, Decode, RowValues, compact InMemoryValueData batches, and deterministic materialisation from complete values into state via the reserved initial origin. Replication events and snapshot batches now project to values before crossing the public API boundary. Protocol docs define UpdateId(0,0) as synthetic initial-state origin and require the new group creator or proposer to be member index 0. Current live group creation and inbound bootstrap validation enforce that rule; migration proposal construction is not live yet, so flotsync-git-pow.4 must enforce the same rule where it introduces the proposal construction path. Validation passed: cargo fmt; cargo check -p flotsync_replication --tests; cargo clippy -p flotsync_data_types -p flotsync_replication --tests -- -W clippy::pedantic; cargo test -p flotsync_data_types --tests -- --test-threads=1; cargo test -p flotsync_replication --tests -- --test-threads=1; amm scripts/okf-docs.sc generate-index; amm scripts/okf-docs.sc check."
