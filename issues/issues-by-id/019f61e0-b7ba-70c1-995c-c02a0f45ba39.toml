title = "Redesign application row interface to hide CRDT state"
body = """
Redesign the application-facing row interface so listeners and snapshot readers receive only current projected values, never cloned CRDT field state.

Completed so far:
P01. Rename-only vocabulary pre-pass was committed as bd5dce8.
P02. Application-facing row values and compact snapshot value rows were introduced, with deterministic initial-state embedding using UpdateId::INITIAL_STATE_ORIGIN.
P03. Partial review pass R01-R26 was implemented: protocol G-rule numbering, projected type-kind helpers, decode cleanup, private checked RowValues, row-major value batches, projection helper narrowing, embedding error naming, and full CRDT-state deterministic tests.
P04. Full review pass R27-R49 was implemented: embedding terminology, ValueType, borrowed initial-value validation, snapshot value-row API cleanup, reusable snapshot batches, schema-aware pending-group initial row decode, and creator/member-index validation.
P05. Compile-fix pass updated stale call sites in flotsync_messages, flotsync_io_examples, and secure_runtime for RowStateSnapshot, SnapshotValueRow, RowValueRead, and group_schema.

Current agreed follow-up plan from 2026-07-17:
R50. Deferred. RowStateSnapshot by-name projected access is inefficient on snapshot export, but fixing it locally would paper over a larger storage/API batching design flaw. P1 follow-up flotsync-git-vy1 tracks redesigning the interaction between replication API batching and storage API row-snapshot batch fetches.
R51. Document precisely what Field::validate_field_value validates: nullability, replicated data-type shape, primitive/array compatibility, integer range compatibility, and finite-state compatibility for initial values, without normalising or building CRDT state.
R52. Refactor public_api.rs owned validation helpers to delegate to borrowed/ref validation via as_ref where possible.
R53. Update the validate_primitive_integer clippy reason to say validation path.
R54. Remove bloaty value-name helpers where possible and use existing type formatting through value_type().to_string(), including ArrayType/BasicDataType display for ARRAY<...>.
R55. Remove the Option representation from SnapshotValueRowBatch so empty has one representation while still retaining reusable InMemoryValueData allocations.
R56. Simplify creator_first_member_order absent-creator test with assert_matches.
R57. Keep the recent compile-fix changes in scope and validate the workspace/test paths they touched.

Acceptance criteria:
A01. Public listener events and snapshot rows expose projected values only, never CRDT row state.
A02. Initial group value rows embed into deterministic CRDT state through the reserved initial-state origin.
A03. Snapshot batches preserve useful value-buffer allocations across provider reuse.
A04. Review comments R51-R57 are implemented; R50 is intentionally deferred to flotsync-git-vy1.

Validation plan:
T01. Run cargo fmt.
T02. Run cargo check --workspace --tests.
T03. Run cargo clippy -p flotsync_data_types -p flotsync_replication --tests -- -W clippy::pedantic.
T04. Run targeted tests for affected data-types/replication paths as needed.
T05. Run checklist example tests if compile-fix files remain touched.

Context:
C01. This blocks flotsync-git-pow.4.
C02. Follow-up flotsync-git-a17 tracks explicit group leave semantics.
C03. Follow-up flotsync-git-vy1 tracks the storage/API batching redesign discovered from R50."""
