title = "Complete custom UDP discovery for replicated checklist"
body = """
Tracking slice for making custom, non-mDNS peer discovery usable by the replication runtime. Completion criterion: the replicated_checklist application can run without any flotsync.replication.runtime.static-peer-routes entries; static-peer-routes become optional hints rather than required for functionality. Scope is the fully custom UDP path first. mDNS browser/public-message tasks are explicitly out of scope for this slice.

## Notes

Agreed custom-only sequence: S01 fix flotsync-54m7 CLI shutdown handle ownership; S02 complete flotsync-31m PeerDiscovery+Tracking protocol/auth rules for the custom path; S03 complete flotsync-brt Kompact interface/path for custom announcements; S04 complete flotsync-0mi socket reuse configuration where needed for custom UDP discovery; S05 complete flotsync-gxle custom UDP peer tracker route source; S06 complete flotsync-ol4e runtime wiring so custom-discovered routes and static hints are composed; S07 complete flotsync-5hvw replicated-checklist validation without static-peer-routes. mDNS tasks flotsync-dnt and flotsync-2ss are intentionally out of scope for this slice."""
