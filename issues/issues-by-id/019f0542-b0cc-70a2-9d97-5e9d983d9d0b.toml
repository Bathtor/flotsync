title = "Implement protobuf serialization for flotsync_data_types in flotsync_messages"
body = """
Define and implement protobuf encoding/decoding for flotsync_data_types snapshots and operations in flotsync_messages, covering LinearString, LinearList, and LinearLatestValueWins. Include primitive-specialized encoding paths where applicable and stable mappings for IDs and tombstones.

## Acceptance Criteria

1) Protobuf schemas/messages added for snapshot and operation payloads for LinearString, LinearList, and LinearLatestValueWins. 2) flotsync_messages exposes conversion helpers between protobuf payloads and flotsync_data_types snapshot/operation APIs. 3) Roundtrip tests verify encode/decode correctness for all three types, including deleted/tombstone nodes and boundary nodes. 4) Documentation describes field mappings and compatibility expectations."""
