title = "Implement chunked snapshot fetch and resumable activation"
body = """
Implement the larger non-inline snapshot transfer slice for group invitations, migration proposals, and far-behind existing members.

Scope:
A. Add a general snapshot fetch protocol that can request a snapshot by SnapshotRef.
B. Transfer snapshot data in replication-level chunks so transport layers never need to assemble multi-GB payloads in memory.
C. Persist chunk progress and resume fetch after restart.
D. Allow accepted invitations/proposals with Metadata initial_snapshot to activate after the full snapshot is fetched and applied.
E. Allow existing group members to choose full snapshot fetch instead of replaying many deltas when policy decides it is cheaper.

Dependencies:
F. Requires pending activation/store lifecycle groundwork.
G. Requires snapshot metadata/wire groundwork.

Out of scope:
H. This task is intentionally outside the inline-snapshot migration policy parent."""
