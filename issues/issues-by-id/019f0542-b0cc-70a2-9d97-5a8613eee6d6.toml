ref = "flotsync-54m7"
title = "Fix discovery CLI shutdown with active service handles"
body = "After pressing Enter in flotsync_discovery_cli --active, Kompact kills the IO driver, bridge, and peer-announcement component, but shutdown().wait() does not complete because the CLI still holds Arc<Component<...>> references inside ActiveService while waiting for shutdown. The process exits only after Ctrl-C. Drop active service handles before waiting on system shutdown or otherwise restructure shutdown ownership so active mode terminates cleanly."
