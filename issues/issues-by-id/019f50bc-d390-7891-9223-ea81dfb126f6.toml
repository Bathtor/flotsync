ref = "flotsync-git-5gi"
title = "Limit identifier length to 255 segments"
body = """
Priority: P0

Limit identifier lengths to at most 255 segments so protocol transcripts can encode segment counts in a single byte instead of burning fixed-width u64 prefixes.

Rationale:
- protobuf repeated fields use variable-width encoding, so the current unbounded-ish shape was not painful there.
- crypto transcripts and other canonical byte encodings need fixed-width prefixes, where large count widths add unnecessary bytes.
- API consumers on lower-width systems should not be forced to handle very large identifier counts or identifiers.

Expected scope:
- add a central identifier segment-count invariant of <= 255.
- use a byte-sized count in fixed-width transcript encodings where member identifiers are written.
- update constructors/decoders/tests to reject overlong identifiers consistently.

Agreed implementation plan:
1. Add a central max segment constant in flotsync_core::member and enforce it across Identifier/IdentifierBuf constructors, parsing, UUID segment parsing, and mutable buffer extension. Keep usize in memory where convenient.
2. Document the 255-segment limit on the discovery protobuf Identifier message even though protobuf still represents segments as a repeated string field.
3. Ensure remote protobuf decoding through flotsync_messages::wire rejects overlong member identifiers and carries an explicit wire decode error.
4. Ensure storage/user boundaries inherit the central parser/constructor checks: SQLite text decode, checklist config, static peer route config, and clap MemberIdentity parsing.
5. Change fixed-width security transcripts that encode member identity segment counts from u64 to u8, including both buffer append and group nonce hashing paths.
6. Add focused tests for accepted boundary length, rejected overlong construction/parsing/wire decode, protobuf documentation-adjacent conversion behaviour, and transcript count width changes.

Estimated implementation size: about 180-320 LOC, primarily tests and error plumbing; comfortably under 1000 LOC."""
