title = "Design hierarchical identity trust inheritance"
body = """
Design hierarchical member identity trust and inheritance for segmented MemberIdentity values such as bob and bob.phone.

Questions:
Q01. What is the semantic difference between a conceptual user identity and a device/subidentity?
Q02. Can trust granted to a parent identity imply trust in child identities, and under which policies?
Q03. What evidence is required before accepting a child identity: parent signature, existing trusted device signature, explicit user approval, group bootstrap, or another mechanism?
Q04. Can one trusted child device introduce sibling devices or parent-level trust, or is trust directional and capped by the authority that signed it?
Q05. How should trust records bind to exact keys so a compromised device cannot silently replace parent or sibling keys?
Q06. How does hierarchy interact with revocation, key rotation, group invitation policies, and displayed fingerprints?"""
