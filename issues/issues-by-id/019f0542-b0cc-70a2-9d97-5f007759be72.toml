title = "Garbage collect stale route-establishment watches"
body = """
Route-establishment route watches can remain stale after peer restarts, topology changes, or removed manual watches. Before release, add bounded garbage collection for stale route-establishment state.

Scope:
- Expire peer-announced interest after an appropriate receiver-owned freshness window.
- Remove route state once there is no remaining interest and verification is stale or otherwise inactive.
- Keep manual watches authoritative: removed manual watches should not keep routes alive indefinitely.
- Preserve reachable lease/refresh semantics for currently verified routes.
- Add focused tests for peer restart churn, removed manual watches, stale-route cleanup, and no cleanup of active reachable routes.

Context:
- Discovered while planning flotsync-bztn.
- Not required for the first static-route-hints slice, but should happen before release."""
