ref = "flotsync-6in"
title = "Upstream Kompact config array iteration API"
body = "Kompact ConfigLookup currently lets consumers select an indexed element, but does not expose selected array values as a slice or iterator. flotsync_replication's static peer route parser currently has to probe get_index(index) until MissingIndex. Upstream an API such as ConfigLookup::as_array()/iter_array() or a typed iterator so consumers can avoid guessing indices, then update flotsync_replication/src/runtime/host/discovery.rs to use it."
status = "closed"
status_reason = "Kompact config array iteration API is upstreamed and flotsync use-sites now use array_entries()"
