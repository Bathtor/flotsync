title = "Publish and verify member public keys through discovery"
body = """
Follow-up after the flotsync_security MVP: move beyond configured trusted public JWKS files by integrating public key advertisement and verification into discovery or a related trust mechanism. This should settle how discovery announcements carry key material or key references, how keys are authenticated, and how runtime trust decisions avoid accepting spoofed identities.

## Acceptance Criteria

Discovery or a defined adjacent trust path can advertise member public keys or references; recipients can authenticate them before use; configured JWKS trust remains available as a bootstrap or override path; and tests cover spoofed announcements and key mismatch rejection."""
