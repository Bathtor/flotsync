ref = "flotsync-ist"
title = "Publish and verify member public keys through discovery"
body = """
Follow-up after the flotsync_security MVP: move beyond configured trusted public JWKS files by integrating public key advertisement and verification into discovery or a related trust mechanism. This should settle how discovery announcements carry key material or key references, how keys are authenticated, how hierarchical member identities affect trust decisions, and how runtime trust decisions avoid accepting spoofed identities.

## Acceptance Criteria

Discovery or a defined adjacent trust path can advertise member public keys or references; recipients can authenticate them before use; DB-native provisioned trust remains available as a bootstrap or override path; JWKS files and jose-jwk are removed by the agreed key-format implementation path; and tests cover spoofed announcements, key mismatch rejection, and policy-sensitive trust decisions."""
