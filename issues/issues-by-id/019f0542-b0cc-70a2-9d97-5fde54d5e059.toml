title = "Support structural dataset identifiers"
body = 'DatasetId is currently a flat SQL-like identifier, so the replicated checklist example uses checklist_items even though the logical identity would be structural ["checklist", "items"]. Add support for structural dataset identifiers if we want dataset ids to align with member-style multi-segment identities. This likely touches the public API, store encoding, wire representation, and migrations/compatibility.'
