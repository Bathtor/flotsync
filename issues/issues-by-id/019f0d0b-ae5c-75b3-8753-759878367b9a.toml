id = "019f0d0b-ae5c-75b3-8753-759878367b9a"
ref = "flotsync-ist.7"
title = "Fetch key bundles directly from discovery endpoints"
body = """
Implement the in-slice fallback key acquisition path from flotsync-ist.1.3 and flotsync-ist.1.7: request a canonical public key bundle directly from the endpoint that made an introduction claim, without relying on route-established replication traffic.

Agreed direction:
AD01. Direct endpoint key exchange is raw endpoint discovery traffic, not route-established replication traffic.
AD02. It is used when an IntroductionClaim names an unknown KeyFingerprint.
AD03. The request carries member_id, requested 32-byte fingerprint, and a nonce.
AD04. The response carries the canonical public key bundle matching the requested fingerprint, echoes the nonce, and is signed over the exact encoded response payload by the corresponding key.
AD05. Direct discovery wire/protobuf frames carry raw fingerprint bytes. Padded base64url canonical strings and grouped display strings are API/display helpers from flotsync-ist.8, not discovery-wire payloads.
AD06. The minimal public key bundle is expected to fit comfortably in one conservative UDP datagram; UDPour is out of scope unless evidence chains or larger payloads are added later.
AD07. A directly returned bundle proves at most possession/self-assertion. It is stored as candidate public key material without LocalExplicitTrust and does not grant ReplicationRuntime or BootstrapActivation authority by itself.
AD08. Once local policy authorises the returned bundle for MemberRoutePublication, later route establishment probes may verify and publish the route via flotsync-ist.6.
AD09. RouteEstablishmentComponent does not own request/response state for this feature. It emits a one-way missing-key observation containing the endpoint route, member_id, and fingerprint.
AD10. A new KeyMaterialDiscoveryComponent owns DB double-checks, in-progress suppression, request nonce and timeout state, lookup request sends, response matching, response validation, and storing candidate material.
AD11. KeyMaterialDiscoveryComponent also owns inbound lookup responder behaviour, answering only for the local member and local discovery fingerprint.
AD12. There is no callback to RouteEstablishmentComponent. Later peer announcements or probes naturally succeed after the bundle is stored.
AD13. Re-use the existing DiscoveryCredentials trait rather than introducing a separate key-material security trait in this slice.

Implementation plan:
IP01. Extend discovery protobuf with key-bundle lookup request and signed response frames.
IP02. Add route protocol helpers for endpoint-frame encoding plus conservative request/response validation.
IP03. Extend DiscoveryCredentials with local public bundle access, key-material availability checks, direct-discovery candidate storage, and lookup response signing/verifying operations as needed.
IP04. Add KeyMaterialDiscoveryComponent with route transport, endpoint lifecycle, pending request timeout state, inbound request responder, inbound response validator, and candidate-material storage.
IP05. Add a one-way port/event from RouteEstablishmentComponent to KeyMaterialDiscoveryComponent when claim verification fails because exact key material is missing.
IP06. Wire the new component into the runtime host topology beside route establishment and shared route transport.
IP07. Re-use existing route-establishment test harness patterns where practical for route transport submit/inbound behaviour.

Acceptance criteria:
AC01. Discovery protocol has request/response frames for exact member_id plus fingerprint key-bundle lookup against a concrete endpoint.
AC02. Responses validate fingerprint, member identity, nonce, bundle shape, and response signature before storing candidate public key material.
AC03. Directly acquired bundles are not trusted for ReplicationRuntime by default.
AC04. Route establishment can trigger acquisition when it observes an introduction fingerprint whose exact key material is missing, without owning request state or receiving a callback.
AC05. Tests cover successful bundle response, wrong fingerprint, wrong member identity, nonce mismatch, malformed bundle, no implicit trust promotion, responder filtering, and in-progress suppression where practical.

Estimate: roughly 1100-1700 LOC across discovery protobuf, protocol helpers, new key-material discovery component, route-establishment one-way observation, runtime-host wiring, security/storage hooks, and tests. This is intentionally one task; the new component boundary keeps the extra lifecycle complexity out of RouteEstablishmentComponent."""
