ref = "flotsync-ist.1.3"
title = "Design untrusted discovery key advertisements"
body = """
Design how discovery can advertise untrusted key material without making discovery trust decisions by itself.

Questions:
Q01. Which discovery frames may carry key material or fingerprints: repeated peer announcements, route introductions, or a new adjacent trust frame?
Q02. How do we avoid bloating periodic announcements while still letting peers discover usable candidate keys?
Q03. What database state represents untrusted observed keys separately from trusted keys?
Q04. Which state transitions are allowed from untrusted to trusted, and which require explicit application approval?
Q05. How do untrusted discovery observations distinguish a claimed child identity from trust inherited through a known parent identity?"""
