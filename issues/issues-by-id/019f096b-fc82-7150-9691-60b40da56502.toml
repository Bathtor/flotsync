author = "lkroll"
body = "Outcome agreed. Discovery cannot bootstrap trust through route establishment because IntroductionClaims must be verified before routes are accepted. The minimum discovery layer is therefore fingerprint-bound claim verification: IntroductionClaims include member_id plus canonical key bundle fingerprint, and route establishment verifies against exact stored key material with a narrow route_identity authority only. Unknown fingerprints become observations and trigger key acquisition. Created in-slice tasks flotsync-ist.6 for fingerprint-bound IntroductionClaim verification and flotsync-ist.7 for raw endpoint key-bundle fetch that does not rely on route establishment. Created deferred tasks flotsync-kxpeer for trusted-peer bundle/evidence exchange and flotsync-relay-keys for relay-assisted bundle storage and lookup design."
