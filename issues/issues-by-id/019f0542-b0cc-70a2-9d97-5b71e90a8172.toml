ref = "flotsync-36j"
title = "Remove or consume runtime UDP observer backlog after startup bind"
body = "DeliveryRuntimeHost currently wires RuntimeUdpObserver to the shared IoBridge and queues every UdpIndication into an internal IndicationQueue. That queue is only consumed during external UDP socket startup binding, so ongoing socket-activity indications can accumulate unboundedly in long-running runtimes. Revisit this runtime-host design and either remove the observer after startup, scope it to bind confirmation only, or actively consume/drop irrelevant indications."
