id = "019f7a4f-c2c8-7bf0-b3a9-5ccb333e941e"
ref = "flotsync-git-03f"
title = "Deactivate old group during membership migration"
body = """
Implement the old-group lifecycle transition that accompanies an accepted membership migration.

Agreed lifecycle:
A. Persist one lifecycle on each hosted group: Open, ReadOnly { successor_group_id, final_versions }, or Closed { successor_group_id, final_versions }. Keep both the accepted target and final-version cut immutable from the accepted MigrationProposal.
B. Acceptance atomically records activation and moves the old group from Open to ReadOnly. Successful target activation moves the old group to Closed and removes accepted activation work. Restart resumes accepted activation without asking the listener again.
C. Locally initiated migration follows the same lifecycle semantics. Invitations received by members that do not host the old group activate only the target group.
D. Existing local state may be behind or ahead of final_versions; do not constrain progress or delete existing updates merely because it differs from the cut.

Application access:
E. Open groups retain all application operations.
F. ReadOnly groups reject publish_changes and change_group_membership, but allow snapshot_rows and application request_summary. Inbound updates continue to produce listener row-change events.
G. Closed groups additionally reject snapshot_rows and application request_summary. Inbound updates are applied without listener notification.
H. Omit ReadOnly and Closed groups from application ReadTokens. Centralise lifecycle permission checks.

Pending proposal arbitration:
I. Multiple decision-state proposals may coexist for one old group. Keep storage target-group keyed and group by old_group_id in memory.
J. Expose the complete current candidate set for one old group together, including at startup. A singleton MigrationProposals event remains valid and is expected to be the common case.
K. Rejecting one candidate removes only that candidate and inactive target material. Accepting one atomically moves it to activation, removes competitors and their inactive material, and marks the old group ReadOnly.
L. For ReadOnly or Closed groups, a proposal with the accepted successor and cut is an idempotent replay. A different target or cut is a permanent terminal rejection before setup validation and listener notification; acknowledge reliable processing so it is not retried.
M. Do not add backend-specific grouped queries or uniqueness constraints preventing multiple undecided candidates.

Replication and catch-up:
N. Keep ReadOnly and Closed groups installed in membership and security state for old-group traffic.
O. Continue accepting Update, UpdateBatch, SummaryRequest, and NeedRange traffic. Newly received producer versions beyond the cut may be dropped as best-effort resource protection; existing state beyond it remains valid.
P. For non-open groups, advertise the pointwise intersection of current versions and the cut, intersect peer summaries before deriving missing ranges, request only through the cut, and truncate served NeedRange intervals at the cut.
Q. Trim outstanding catch-up requests when a group becomes ReadOnly. These bounds are traffic controls, not stored-state correctness invariants.

Persistence and recovery:
R. Extend the existing replication-group representation rather than introducing a separate lifecycle table. No deployed database migration is required.
S. Preserve atomic boundaries so old and target groups cannot both remain writable after successful activation. Failure after acceptance leaves the old group ReadOnly and recoverable.
T. Preserve idempotence for proposal replay, activation replay, and startup recovery.
U. Active-record decomposition must preserve both version_vector and lifecycle in a named active-state value; inactive material activation remains explicitly Open.

Tests and documentation:
V. Cover Open, ReadOnly, and Closed lifecycle persistence and target-keyed pending-work transitions.
W. Cover application permissions, ReadToken filtering, grouped proposals, competition, replay classification, startup recovery, local and inbound cutover, and listener suppression.
X. Add stateful catch-up tests proving FinaliseGroup trims existing demand and inbound NeedRange work is truncated at the accepted cut.
Y. Keep protocol/runtime documentation limited to implemented semantics.

Explicit boundaries:
Z. Application-facing deactivation events remain in flotsync-git-pvp and flotsync-git-os1.
AA. The standalone GroupClose API remains flotsync-git-lg9.
AB. Large snapshot transfer remains outside this task.

Agreed review refinements:
AI. Store MigrationProposals candidates in SmallVec with inline capacity one while retaining singleton event construction.
AJ. Put repeated pending responder construction behind ComponentBackedPendingGroupResponder::new.
AK. Treat a response whose pending work has disappeared as an idempotent no-op, document why, and log the stale work key at debug level.
AL. Separate migration-arrival classification from candidate setup, policy, persistence, and activation so terminal replay/conflict paths do not obscure the candidate path.
AM. Name dense post-cut and asynchronous activation results before branching or matching.
AN. Reuse lifecycle and update-message test helpers so the read-only/closed listener test remains linear without a too-many-lines allowance.
AO. Replace tuple-valued SQLite lifecycle encoding with a backend label accessor and the lifecycle's existing named successor and final-version accessors.
AP. Decode SQLite lifecycle state by its label first, require variant fields with contextual Option errors, and reject migration fields on Open rows.
AQ. Single-source SQLite lifecycle labels across Rust encoding/decoding and the replication_groups CHECK declaration.
AR. Update all downstream workspace consumers for explicit Open lifecycle construction and grouped migration-proposal events, then verify the complete workspace.
AS. Name the awaited listener-notification result before matching it.
AT. Keep SQLite lifecycle labels as adjacent ordinary constants and a readable plain schema statement, with explicit duplication where required.
AU. Validate Open lifecycle columns with ensure! before returning the decoded Open lifecycle.

Implementation estimate:
AC. Lifecycle model and persistence: 140-220 LOC.
AD. Runtime cutover, permissions, and recovery: 220-340 LOC.
AE. Candidate grouping and arbitration: 120-200 LOC.
AF. Catch-up bounds: 120-190 LOC.
AG. Tests and documentation: 240-360 LOC.
AH. The final review refinements touch approximately 215-375 LOC, with likely net deletion in tests and control flow. The complete slice remains over 1,000 LOC because lifecycle, arbitration, catch-up, and regression coverage are correctness-critical and local to this task."""
