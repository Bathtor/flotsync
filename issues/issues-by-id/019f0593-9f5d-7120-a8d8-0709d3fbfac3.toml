id = "019f0593-9f5d-7120-a8d8-0709d3fbfac3"
ref = "flotsync-6s0-m1"
title = "Introduce runtime owned proto conversion traits"
body = """
Introduce the baseline runtime protobuf conversion mechanism for owned generated protobuf messages.

Scope A: define a small trait family for owned runtime conversions: EncodeProto, DecodeProto, and DecodeProtoWith<Context>. Keep context-free decode and contextual decode as distinct traits so required runtime context cannot disappear behind optional arguments.

Scope B: add MemberCountContext for conversions that need hosted-group member count, especially UpdateMessage, SummaryMessage, UpdateBatch-related paths, and VersionVector decode.

Scope C: convert the existing runtime message and helper conversions in flotsync_replication/src/runtime/messages.rs from ad hoc to_proto/from_proto/encode_* helpers into trait implementations. This should cover RuntimeMessage, WireRuntimeMessage, BootstrapGroupMessage, BootstrapMemberPublicKeysMessage, UpdateMessage, WireUpdateMessage, SummaryRequestMessage, SummaryMessage, WireSummaryMessage, NeedRangeMessage, UpdateRangeMessage, UpdateBatchMessage, WireUpdateBatchMessage, DatasetUpdateMessage, WireVersionVector, and VersionVector.

Scope D: update runtime/envelope.rs, store/sqlite.rs, and focused tests to use the new mechanism rather than ad hoc conversion helpers.

Acceptance E: conversion call sites have a consistent trait shape, contextual decode is explicit in the type/API, representative runtime encode/decode round trips are tested, and any intentionally remaining clones/allocations are documented near the relevant implementations.

Out of scope F: generated borrowed view decode and borrowed source encode adapters. Those are tracked separately in flotsync-6s0-m2 and flotsync-6s0-m3."""
