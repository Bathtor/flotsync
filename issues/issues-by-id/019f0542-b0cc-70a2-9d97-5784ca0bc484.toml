ref = "flotsync-469"
title = "Fix egress adopt_payload to accept payloads already owned by the same pool"
body = "EgressPool::adopt_payload currently rejects pooled IoPayload fragments once they have been cloned, even when those fragments are already owned by the same egress pool. UDPour currently has to fall back to copying in this case. Adjust the adopt logic so payloads already retargeted to the destination pool are accepted instead of treated as shared ownership failures."
