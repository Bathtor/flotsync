title = "Design flotsync_security key rotation and revocation"
body = """
Follow-up after the flotsync_security MVP: design and implement rotation and revocation for member identity keys and group symmetric keys. This should define how compromised member keys trigger group migration, how old keys remain usable for historical verification when appropriate, how revoked keys are represented, and what store/runtime migrations are required.

## Acceptance Criteria

There is a concrete rotation and revocation design covering member signing keys, member encryption keys, group keys, stored group metadata, migration interaction, and compatibility with existing groups; implementation tasks or code changes follow that design."""
