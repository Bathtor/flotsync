title = "Define migration policy API and public types"
body = """
Implement the public API model for the agreed migration-policy design.

Scope:
A. Add composite MigrationId { old_group_id, new_group_id }.
B. Add MigrationProposal alongside GroupInvitation rather than replacing it.
C. Add GroupInvitationSource for direct invitations and migration-derived invitations.
D. Add InitialSnapshot with Empty, Inline, and Metadata variants.
E. Add SnapshotRef and InitialSnapshotMetadata with primary/equivalent refs and optional record_count.
F. Split invitation, migration, and group-close policy types with safe defaults.
G. Document accepted-but-not-active lifecycle terminology in the API docs.

Out of scope:
H. Runtime behaviour beyond unsupported stubs.
I. Store persistence.
J. Chunked snapshot transfer."""
