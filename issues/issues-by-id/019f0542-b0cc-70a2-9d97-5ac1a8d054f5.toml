ref = "flotsync-icw"
title = "Introduce typed HPKE context for security APIs"
body = "Follow-up from flotsync_security review. The raw HPKE helpers currently accept opaque info/aad byte slices, which makes callers responsible for building protocol-domain separation and authenticated context exactly the same way on seal and open. Replace or wrap those arguments with a typed HPKE context owned by flotsync_security. The context should canonicalise the envelope purpose, sender and recipient member identities, group id, delivery message id, and authenticated public metadata into HPKE info/aad internally, so public callers cannot accidentally diverge."
