id = "019f09ba-46ec-77b1-8410-ce73b00b91d4"
author = "lkroll"
body = "Outcome agreed. Bootstrap should cover exact individual device/member identities and expected canonical key bundle fingerprints. Full public bundles are optional evidence, not mandatory payload, and cannot silently create or overwrite trust. Conservative policy treats contained or resolved keys as authorised only through local trust evaluation. Group metadata installation may proceed with unresolved non-local member keys once the inviter/bootstrap sender is trusted enough; unresolved members are blocked from runtime traffic until their exact key material resolves and becomes authorised. Created implementation tasks flotsync-ist.4 for bootstrap fingerprints/optional bundles and flotsync-ist.5 for unresolved-key install plus runtime gating."
