id = "019f096c-5096-7432-978b-f05bc8fbc5b6"
ref = "flotsync-ist.1.5"
title = "Design bootstrap-carried member keys"
body = """
Design how group bootstrap carries member key material and how recipients decide whether that material is trusted enough to install group state.

Questions:
Q01. Which keys must every bootstrap payload carry for all group members?
Q02. Which policy decides who is allowed to invite a local member into a group and at what trust level?
Q03. Can bootstrap-installed keys ever create first trust, or must they match existing trust unless a policy explicitly permits invited trust?
Q04. How do we prevent invalid keys from spreading through group creation or re-bootstrap flows?
Q05. If a bootstrap names device identities such as bob.phone, does trust apply only to that exact device, to the parent bob, or according to a configurable inheritance policy?"""
