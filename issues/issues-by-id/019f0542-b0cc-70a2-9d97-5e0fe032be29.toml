title = "Prototype the experimental columnar HistorySnapshot wire format and codec"
body = """
Add the experimental columnar HistorySnapshot protobuf messages and a low-level benchmark-only codec path that stores node metadata separately from dense value arrays.

## Acceptance Criteria

1) datamodel.proto contains an experimental columnar HistorySnapshot representation with node metadata and a dense PrimitiveArrayValue payload section. 2) flotsync_messages has low-level encode/decode helpers for the experimental format covering LatestValueWins, LinearString, and LinearList. 3) The experimental codec remains isolated from the current public snapshot adapter path."""
