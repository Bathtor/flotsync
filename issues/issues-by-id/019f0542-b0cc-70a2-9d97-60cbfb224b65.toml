title = "Revisit Kompact Recipient adapters for closure-carried tags"
body = "The current Kompact Recipient adapter surface only supports pure function forwarding, which makes it awkward to attach small runtime tags when routing TcpSessionEvent values. flotsync_io added its own direct tagged target wrapper around ActorRef as a local workaround. Investigate whether Kompact should offer a closure-carrying Recipient-like adapter or another first-class pattern for tagged forwarding so libraries do not need custom wrappers."
