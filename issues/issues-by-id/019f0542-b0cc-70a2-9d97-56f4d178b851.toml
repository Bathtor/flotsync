title = "Persist dataset_updates and apply causally ready chains transactionally"
body = """
Replace the in-memory pending update queue with persisted dataset_updates records for inbound and outbound replication traffic. Support efficient lookup of not-yet-applied candidates, load those candidates into memory when checking causal readiness, and commit an entire newly-ready apply chain atomically so failures do not leave partially advanced replication state behind.

## Acceptance Criteria

Inbound and outbound updates are durably recorded, duplicate and conflict detection use persisted records, and applying one update together with any newly-ready successors is all-or-nothing at the transaction boundary."""
