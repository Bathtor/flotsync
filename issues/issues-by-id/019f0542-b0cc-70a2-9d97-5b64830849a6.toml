title = "Introduce a proper local delivery endpoint bind manager"
body = "The replication runtime currently binds its externally reachable UDP socket directly from DeliveryRuntimeHost startup via a temporary observer/queue path. Replace that with a dedicated internal component or service that owns the local endpoint binding lifecycle, starting with a simple single-preconfigured-port stub and leaving network-change handling for later. This should also eliminate the temporary RuntimeUdpObserver bind path from production runtime code."
