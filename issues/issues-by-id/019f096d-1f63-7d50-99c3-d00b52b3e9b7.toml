id = "019f097b-f2d6-7ea2-b2e5-eb1c7f17f56d"
author = "lkroll"
body = "Outcome agreed: create implementation task flotsync-ist.2. The design decision is to use Flotsync-owned protobuf formats for public key bundles and encrypted local-private key payloads, with both Ed25519 signing and X25519 encryption keys mandatory in v1. Base64url/QR/text wrappers are left to the exchange-mechanism tasks. Hierarchical MemberIdentity segments must be preserved by the format, while trust inheritance is handled in the separate hierarchy/policy design."
