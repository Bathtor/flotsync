ref = "flotsync-ist.1.9"
title = "Design DB-native key format and remove JWKS"
body = """
Design DB-native key records and the path to remove JWKS files and jose-jwk dependency entirely.

Questions:
Q01. What minimal typed private-key and public-key records should be stored in SQLite instead of encrypted JWKS text?
Q02. What canonical binary format should Flotsync use for key bundles on the wire and in QR/pasteable invites?
Q03. Which algorithm identifiers, version fields, and compatibility rules are needed for future key changes?
Q04. Can all current JWKS config, parsing, generation, tests, and dependencies be removed rather than retained as import/export?
Q05. What reset/recovery path replaces separate key files when stores are deleted or incompatible?"""
