ref = "flotsync-ist.2"
title = "Replace JWKS identity provisioning with protobuf key bundles"
body = """
Implement the agreed key-format outcome from flotsync-ist.1.9: replace JWKS identity provisioning with Flotsync-native protobuf key bundles and DB-native local key storage.

Agreed direction:
A01. Public key bundles and encrypted local-private key payloads are Flotsync-owned protobuf formats.
A02. Base64url or QR/text wrappers are presentation concerns for exchange mechanisms, not part of this first implementation.
A03. Public member bundles carry both Ed25519 signing and X25519 encryption public keys as mandatory v1 fields.
A04. Local private-key store payloads carry the corresponding private material and enough public material to validate consistency on load.
A05. One canonical public bundle type should be reusable by QR, pasteable invites, discovery, relays, bootstrap, and fingerprints.
A06. The segmented MemberIdentity must be preserved exactly so later identity-hierarchy and trust-inheritance policy can reason about parent and child identities.

Acceptance criteria:
B01. Production identity generation, parsing, and provisioning no longer depend on jose-jwk or JWKS files.
B02. local_members stores encrypted typed protobuf private-key payloads instead of encrypted JWKS text.
B03. known_peers continues to store public key bytes, with conversions from the canonical public bundle.
B04. flotsync_security exposes encode/decode helpers for the canonical public bundle and local private payload.
B05. replicated-checklist can create/provision identities without local-private-jwks-path or trusted-public-jwks-paths.
B06. Tests cover roundtrip, malformed payloads, unsupported versions/schemes, member mismatch, public/private mismatch, and runtime loading from the new store payload.

Estimate: roughly 500-900 LOC across protobuf messages, flotsync_security identity handling, store provisioning, replicated-checklist setup, and tests."""
