id = "019f097b-ba0f-7002-944a-8efa67884f15"
ref = "flotsync-ist.2"
title = "Replace JWKS identity provisioning with protobuf key bundles"
body = """
Implement the agreed key-format outcome from flotsync-ist.1.9: replace JWKS identity provisioning with Flotsync-native protobuf key bundles and DB-native local key storage.

Agreed implementation plan:
P01. Define Flotsync-owned protobuf key bundle messages in a security protobuf package and expose them through flotsync_messages.
P02. Use symmetric naming: PublicKeyBundle for exchangeable public key material and LocalPrivateKeyBundle for the encrypted local-store plaintext.
P03. Keep both bundle messages identity-free. The authoritative MemberIdentity comes from the database row, provisioning API argument, or caller context.
P04. PublicKeyBundle uses role-named bundle fields, but the key material messages are generic: PublicKey plus KeyScheme. Decode validates that signing_key uses ED25519 and encryption_key uses X25519.
P05. LocalPrivateKeyBundle uses role-named bundle fields, but the key material messages are generic: PrivateKey plus KeyScheme. Decode validates scheme and public/private consistency per role.
P06. Expose a shared SignatureScheme enum from the security proto package and import it into delivery/discovery signature messages where semantically appropriate. Keep key schemes and signature schemes separate.
P07. Base64url, QR, pasteable text, fingerprints, discovery publication, bootstrap key references, and trust/evidence policy are downstream concerns handled by other flotsync-ist children.
P08. Preserve the existing known_peers schema as public key byte columns; add conversions from the canonical public bundle to existing public-key records.
P09. Preserve the existing local_members encrypted store-secret envelope and SQLite columns; change only the encrypted plaintext from JWKS text to encoded LocalPrivateKeyBundle bytes.
P10. Remove production dependence on jose-jwk and JWKS parsing/generation from flotsync_security, replication provisioning, and runtime loading.
P11. Do not replace replicated-checklist setup/config in this slice. Remove obsolete JWKS config/provisioning/generate-keys helper code and let setup/loading fail until flotsync-ist.9 adds the store-native keys commands.
P12. Use view decoding for LocalPrivateKeyBundle so private fields are not allocated into an owned generated proto during load.
P13. Keep private-bundle encoding contained in one helper with explicit zeroisation for now. A P0 follow-up child task will upgrade Buffa and switch private-key encoding to ViewEncode.

Out of scope:
Q01. Store-native replicated-checklist keys commands and manual setup UX; tracked by flotsync-ist.9.
Q02. Pasteable/base64 bundle strings, key fingerprints, and inspect APIs; tracked by flotsync-ist.8.
Q03. Trust evidence, blocked fingerprints, and authority evaluation; tracked by flotsync-ist.3.
Q04. Discovery introduction fingerprints and direct key-bundle fetching; tracked by flotsync-ist.6 and flotsync-ist.7.
Q05. Bootstrap member key fingerprints or unresolved-key install behaviour; tracked by flotsync-ist.4 and flotsync-ist.5.
Q06. Buffa 0.8 upgrade and private-key ViewEncode conversion; tracked by a P0 child task created from this review follow-up.

Acceptance criteria:
R01. Production identity generation, parsing, and provisioning no longer depend on jose-jwk or JWKS files.
R02. local_members stores encrypted typed protobuf LocalPrivateKeyBundle bytes instead of encrypted JWKS text.
R03. known_peers continues to store public key bytes, with conversions from PublicKeyBundle.
R04. flotsync_security exposes encode/decode helpers for PublicKeyBundle and LocalPrivateKeyBundle.
R05. Runtime loading can open the new encrypted local private bundle and validate key-pair consistency.
R06. Replicated-checklist has no temporary replacement JWKS setup path in this slice; obsolete JWKS config and generate-keys helpers are removed, and final key setup is deferred to flotsync-ist.9.
R07. Tests cover roundtrip, malformed payloads, unsupported versions/schemes, public/private mismatch, row-context member handling, and runtime loading from the new store payload.
R08. Delivery/discovery import the shared security SignatureScheme enum where it is the same semantic concept.
R09. LocalPrivateKeyBundle decode uses borrowed protobuf views for private fields.

Estimate: roughly 700-1000 LOC across protobuf messages, flotsync_security identity handling, replication store provisioning/loading, replicated-checklist cleanup, dependency removal, and focused tests."""
