id = "019f098b-8001-7fc0-92ed-86392e41fb7d"
ref = "flotsync-ist.3"
title = "Implement initial trust evidence and capability evaluation"
body = """
Implement the agreed first trust/evidence and permission slice now that shared key fingerprints are available from flotsync-ist.10. This task replaces implicit trusted/untrusted state with explicit evidence plus permission requests derived from policy, evidence, blocked fingerprints, and exact member key material.

Aligned direction:
A01. The model is permission-oriented: ask whether exact key material for an exact member identity may be used for an action requiring an authority scope.
A02. Trust is not a low/medium/high scalar. Evidence is stored, and permission is derived from evidence plus policy at access time.
A03. Stored public key material by itself is observation/material only and grants no authority.
A04. The first positive evidence kind is local_explicit_trust for an exact (MemberIdentity, KeyFingerprint) pair.
A05. Blocked fingerprints are global by fingerprint, not scoped to one identity.
A06. The first authority scopes are replication_runtime and bootstrap_activation.
A07. Incoming bootstrap activation requires permission only for the bootstrap sender, not every listed group member.
A08. Parent/child identity inheritance, remote introducer evidence, remote revocation evidence, live policy reconfiguration, route-authority checks, and key-rotation ordering are out of scope.
A09. Inspect/reporting UX remains out of scope and is tracked separately by child task flotsync-git-4in.
A10. Transaction trait hierarchy cleanup is out of scope and tracked by P0 child task flotsync-git-52p.

Core type shapes:
B01. AuthorityScope has ReplicationRuntime and BootstrapActivation.
B02. TrustPolicy has replication_runtime: MemberKeyTrustRequirement and bootstrap_activation: MemberKeyTrustRequirement.
B03. MemberKeyTrustRequirement has LocalExplicitTrust and DenyAll.
B04. PermissionDecision has Permit and Deny(PermissionDenialReason).
B05. PermissionDenialReason covers MissingKeyMaterial, MissingTrustEvidence, FingerprintBlocked, and PolicyDenied.
B06. MemberKeyId contains member_id: MemberIdentity and fingerprint: KeyFingerprint.
B07. MemberPublicKeysRecord contains key_id: MemberKeyId, signing_public_key bytes, and encryption_public_key bytes.
B08. MemberKeyTrustEvidenceKind has LocalExplicitTrust, string rendering, and FromStr parsing.
B09. MemberKeyTrustEvidenceRecord contains key_id: MemberKeyId and evidence_kind: MemberKeyTrustEvidenceKind.
B10. MemberKeyTrustEvidenceSet wraps enumset::EnumSet<MemberKeyTrustEvidenceKind>, so the in-memory evidence set can grow without local bit-width micromanagement.

Permission API shape:
C01. request_member_key_permission(policy, scope, key_id, evidence, fingerprint_blocked) remains the pure evaluator.
C02. SecurityStore is a cloneable crate-level facade over store: Arc<dyn ReplicationStore> and trust_policy: TrustPolicy.
C03. SecurityStore owns no secret material. It fetches key material existence, evidence rows, and blocked status, then calls the pure evaluator.
C04. SecurityStore remains the future cache insertion point for permission decisions or precomputed authority sets.
C05. SecurityStore exposes exact-key request_member_key_permission and member-level load_permitted_member_public_keys.
C06. load_permitted_member_public_keys denies when no observed key is permitted and errors when more than one observed fingerprint is permitted for the requested member and scope.

SQLite/store shape:
D01. member_public_keys is shaped as (member_identity, key_fingerprint, signing_public_key, encryption_public_key) with PRIMARY KEY (member_identity, key_fingerprint).
D02. key_fingerprint is stored as raw BLOB bytes using KeyFingerprint::as_bytes.
D03. Stored public key bytes must derive exactly the declared fingerprint.
D04. member_key_trust_evidence stores member_identity, key_fingerprint, evidence_kind with PRIMARY KEY (member_identity, key_fingerprint, evidence_kind).
D05. member_key_trust_evidence stores evidence only, not authority scopes.
D06. blocked_key_fingerprints stores key_fingerprint BLOB PRIMARY KEY and has no foreign key.
D07. Evidence-kind string parsing lives on MemberKeyTrustEvidenceKind, not in SQLite-specific code.
D08. Loading trust evidence does not impose SQL ordering before collecting into a set.

Runtime integration:
E01. ReplicationConfig owns TrustPolicy and defaults both current scopes to LocalExplicitTrust.
E02. Runtime load constructs SecurityStore from store.clone() and config.trust_policy.clone().
E03. DeliverySecurity stores SecurityStore and delegates public-key permission/material lookup to it.
E04. Runtime traffic continues to request AuthorityScope::ReplicationRuntime.
E05. Incoming bootstrap sender key validation requests AuthorityScope::BootstrapActivation.
E06. Bootstrap payload validation still checks key presence/member shape for the full payload and compares sender key material.
E07. Existing secure replication behaviour is preserved when prior provisioning writes local_explicit_trust evidence for the same keys that known_peers used to store.

Review cleanups:
F01. Move SecurityStore from delivery/security_store.rs to crate-level security_store.rs.
F02. Restore exact assert_eq checks for MemberPublicKeysRecord debug tests.
F03. Avoid cloning whole public-key records when only MemberKeyId must be retained.
F04. Keep read/write transaction trait unification deferred to flotsync-git-52p.

Tests and validation:
G01. Add evaluator coverage for both authority scopes.
G02. Add SecurityStore coverage for bootstrap_activation denial.
G03. Add bootstrap validation coverage where matching sender keys still fail when bootstrap_activation policy denies the sender.
G04. Run cargo fmt --all, cargo check --workspace, cargo test -p flotsync_replication -- --test-threads=1, and cargo clippy --workspace -- -W clippy::pedantic.

Estimate: roughly 250-450 LOC for the aligned follow-up edits, plus the module move. No persistent schema change."""
