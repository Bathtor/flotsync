id = "019f096c-22ba-75e2-bbd8-94feffc1e0ef"
ref = "flotsync-ist.1.4"
title = "Design trusted introducer key assertions"
body = """
Design trusted-introducer assertions, where an already trusted member vouches for another member key bundle.

Questions:
Q01. What exactly does an introducer sign: member id, full key bundle, trust level, groups, expiry, route context, or policy constraints?
Q02. How do policies account for compromised introducers and prevent one bad member from spreading invalid keys too broadly?
Q03. Are introducer assertions stored permanently, cached as evidence, or reduced to resulting trust state?
Q04. How does this interact with group bootstrap and later key rotation or revocation?
Q05. Can a trusted parent identity introduce child devices, and can one trusted child device introduce sibling devices or parent-level trust?"""
