title = "Apply borrowize enum support to discovery endpoint frames"
body = """
Apply borrowize enum view support to the discovery endpoint frame source.

Agreed scope:
- Keep working on the current branch; do not create a new branch.
- Use `borrowize = "0.2.0"` and keep the lockfile pinned to 0.2.0.
- Replace the hand-written borrowed `DiscoveryEndpointFrameSrc` enum with an owned `DiscoveryEndpointFrame` enum deriving `View`.
- Use the generated default `DiscoveryEndpointFrameView` at existing route-establishment and key-material-discovery call sites.
- Add field overrides so copy fields such as `Uuid` and `KeyFingerprint` remain copied in the generated view.
- Implement endpoint-frame protobuf encoding for `DiscoveryEndpointFrameView`; optionally let owned `DiscoveryEndpointFrame` delegate through `.view()` if useful.
- Do not convert `DatasetUpdateProtoSources` or broader data-model `*Ref` enum pairs in this task because they are either intentional dual-source adapters or tuple-variant refs outside borrowize 0.2.0 support.

Validation plan: run `cargo fmt`, focused route/replication checks/tests, and pedantic clippy for affected crates."""
