title = "Add protobuf schema and UpdateId wire access for datamodel transport"
body = """
Define protobuf messages for the schema snapshot and schema operation surface specialized to UpdateId, and add the minimal flotsync_core API needed for flotsync_messages to construct and inspect UpdateId during wire conversion.

## Acceptance Criteria

1) Protobuf messages cover dataset snapshots, row snapshots, history node streams, state field payloads, and schema operations using UpdateId. 2) flotsync_core exposes the minimal public API needed to encode and decode UpdateId outside the crate. 3) The message layout is documented well enough for the codec tasks to implement against it."""
