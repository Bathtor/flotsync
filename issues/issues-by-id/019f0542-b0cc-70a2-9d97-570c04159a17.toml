title = "Hydrate replication_groups and membership snapshots from ReplicationStore"
body = """
Refactor runtime startup so persisted replication group metadata and canonical member snapshots are loaded from ReplicationStore, then used to seed SharedGroupMemberships. Remove LocalRuntimeState as the whole-runtime source of truth and keep only derived read models plus transaction-scoped metadata in the component.

## Acceptance Criteria

Runtime startup can recover persisted replication groups after restart, SharedGroupMemberships is derived from store state, and the component no longer treats its own in-memory map as the authoritative group registry."""
