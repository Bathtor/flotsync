id = "019f0542-b0cc-70a2-9d97-5b42c741ac8c"
ref = "flotsync-46i"
title = "Preserve listener notifications across partial inbound apply failures"
body = "During replication runtime inbound update draining, one causally-ready update batch may apply successfully before a later buffered batch fails. The current runtime only emits listener notifications after the whole drain completes, which can desynchronise the application-facing event stream from the already-committed local state. Track a follow-up to either emit incrementally with compensating behaviour or redesign the drain/apply contract so committed state and listener notifications cannot diverge."
status = "open"
