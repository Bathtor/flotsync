title = "Shrink runtime working state to transaction-scoped group and row data"
body = """
Refactor LocalRuntimeState into transaction-scoped helpers that operate over stable group metadata plus a small amount of row or dataset working state at a time. Prefer reading through the active store transaction and relying on read-your-own-writes semantics, rather than mirroring whole runtime datasets in component memory.

## Acceptance Criteria

The runtime no longer keeps long-lived full dataset images as its ground truth, row-scale helpers are sufficient for mutation paths, and the remaining in-memory state is clearly scoped to one active transaction."""
