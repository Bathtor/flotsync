title = "Specify Update mapping: SchemaOperation -> Replication Update(ReadVV)"
body = "Narrowed scope for the manual replication slice: the SchemaOperation -> Update(ReadVV) mapping is already implemented in the runtime. Local publish derives update_id from the durable local member version, captures read_versions before local apply, persists ReplicationUpdateRecord, and sends the same values in UpdateBatch. Inbound delivery validates group membership, sender index, duplicate/conflicting update ids, and causal readiness. Remaining work for this task is to document that existing contract and tighten inbound validation by rejecting operation change_id mismatches and impossible/self-dependent read_versions before bad inbound updates can become durable pending state."
