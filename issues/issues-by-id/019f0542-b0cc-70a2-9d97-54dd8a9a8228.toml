ref = "flotsync-m0jj"
title = "Replicated checklist static groups use per-device random group keys"
body = "replicated_checklist currently generates a fresh random GroupKey when inserting the configured static group. Devices bootstrapping the same configured group independently therefore persist different symmetric group secrets under the same group id, so reliable delivery works but group broadcast AEAD open fails. Add a temporary explicit group-secret-password config field, derive the group key from that password plus group identity context, and reject existing local stores whose persisted group key does not match the configured derived key."
