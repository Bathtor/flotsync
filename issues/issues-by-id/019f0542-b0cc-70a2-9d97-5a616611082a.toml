title = "Add proper headless local store-secret backend"
body = "The replicated-checklist example currently depends on the Linux Secret Service/keyring path, which is fragile on headless devices such as Raspberry Pi Ubuntu over SSH. Design and implement an explicit headless local store-secret backend, likely a permissions-checked file backend with clear configuration, actionable errors, and tests. This should replace the temporary unsafe checklist-only profile escape hatch once ready."
