title = "Route static peer routes through route establishment"
body = "Static peer routes currently bypass route establishment and can expose replication routes directly. Follow up by modelling static peer routes as internal peer-announcement observations or equivalent candidate-route inputs, then require route establishment verification before those routes are published to replication. This should also settle whether discovery route candidates can make local_bind non-optional once all published routes originate from the runtime endpoint binding."
