id = "019f096c-be26-76e2-b477-7d196bc20fbf"
ref = "flotsync-ist.1.7"
title = "Design key fingerprints and references"
body = """
Design fingerprints and key references as stable names for key material.

Questions:
Q01. What fingerprint algorithm and canonical input should identify a Flotsync member key bundle?
Q02. Is a fingerprint only display/verification metadata, or can it be used as a network lookup reference?
Q03. How are fingerprints shown to users and exposed to applications without forcing a UI model?
Q04. How do fingerprints interact with versioned key bundles, multiple keys per peer, and future rotation?
Q05. Are fingerprints displayed and compared for exact device identities, parent identities, or both?"""
