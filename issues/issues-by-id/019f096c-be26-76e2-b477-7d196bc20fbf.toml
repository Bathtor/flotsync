author = "lkroll"
body = """
Resolved through flotsync-ist.8, with consumer updates in flotsync-ist.6 and flotsync-ist.7.

Decision summary:
KF01. KeyFingerprint is 32 bytes: SHA-256 over a domain-separated semantic transcript.
KF02. The transcript includes signing scheme, signing public key bytes, encryption scheme, and encryption public key bytes.
KF03. The transcript excludes protobuf bytes, protobuf field order, unknown fields, PublicKeyBundle format version, identity, trust source, display metadata, policy, and application data.
KF04. Fingerprints name exact device/member key material in this slice. Parent identity inheritance is deferred to flotsync-hitr.
KF05. Fingerprints are both display/verification metadata and lookup references.
KF06. Protocol and DB APIs use raw fingerprint bytes where possible.
KF07. The canonical fingerprint string is padded base64url of the 32 fingerprint bytes.
KF08. The recommended display string is the unpadded base64url text grouped as 4-4-4-4-4-4-4-4-4-4-3.
KF09. A fingerprint alone does not identify who owns the key material. Trust/evidence remains bound to exact MemberIdentity plus fingerprint.
KF10. No new implementation task is needed; flotsync-ist.8 owns the fingerprint type, derivation, string helpers, and tests."""
