title = "Add migration proposal and snapshot metadata wire messages"
body = """
Add the wire/runtime message shapes needed for migration proposals, group close, and inline or metadata initial snapshots.

Scope:
A. Add MigrationProposal with old-group signing/scope and both old/new group ids.
B. Add GroupClose with migration id and close mode marker.
C. Add InitialSnapshot wire shape with Empty, Inline, and Metadata.
D. Add SnapshotRef wire shape and equivalent_refs metadata.
E. Preserve compatibility behaviour for unknown message kinds.
F. Keep Metadata sufficient for future non-inline snapshot fetching without implementing chunk transfer here.

Out of scope:
G. Chunked snapshot request/chunk/complete protocol.
H. Runtime activation logic beyond decoding/encoding and dispatch boundaries."""
