title = "Upgrade Buffa and use ViewEncode for private key bundles"
body = """
Upgrade Buffa separately from flotsync-ist.2 because moving from buffa 0.3 to 0.8 changes APIs used across the codebase.

Scope:
P01. Upgrade buffa and buffa-build to a version that exposes buffa::view::ViewEncode.
P02. Adapt existing generated-message and proto helper API usage to the upgraded Buffa APIs.
P03. Switch LocalPrivateKeyBundle encoding to ViewEncode so private key material does not pass through owned generated proto Vec fields.
P04. Keep LocalPrivateKeyBundle decode on borrowed views.
P05. Add focused tests or assertions covering private-bundle roundtrip and malformed private bundle handling after the upgrade.

Origin: review follow-up from flotsync-ist.2. This is intentionally separate from the current key-bundle slice because the Buffa upgrade has broader API fallout."""
