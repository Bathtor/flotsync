id = "019f0542-b0cc-70a2-9d97-594d8b76c49c"
ref = "flotsync-31m"
title = "Specify PeerDiscovery+Tracking protocol and auth rules"
body = """
Define wire payloads and state transitions for the receiver-driven custom UDP Peer/IntroductionRequest/Introduction exchange, including Unknown/Known/Reachable/Stale tracker lifecycle, nonce/challenge handling, signed introduction claims with repeated group ids, and verification rules for publishing routes to replication.

## Design

Agreed receiver-driven custom UDP peer discovery protocol for this slice:

S01 Plaintext Peer beacon: keep Peer as a network-level beacon with instance_uuid and listening_on endpoints only. Do not put member ids or group ids in Peer. The tracker may keep an internal table of every Flotsync-speaking instance/endpoint it observes, independent of replication membership.

S02 Endpoint frame: IntroductionRequest and Introduction are carried as DiscoveryFrame inside the neutral flotsync.endpoint.v1.EndpointFrame on the replication endpoint being verified. Group broadcast and reliable delivery are sibling EndpointFrame branches owned by delivery. Consumers of EndpointFrame ignore branches they do not own.

S03 Plaintext IntroductionRequest: after observing a Peer beacon, the tracker probes each advertised listening_on endpoint by sending an IntroductionRequest with a fresh receiver-generated nonce. The request itself can remain plaintext and replies go to the datagram source of the probed endpoint.

S04 Signed Introduction response: the probed endpoint replies with Introduction containing the instance_uuid, the request nonce, and one or more signed introduction claims. Each SignedIntroductionClaim carries an outer member_id plus an encoded IntroductionClaimPayload that binds one or more group ids to the probed route. Multiple group ids per claim are supported so a member does not need one repeated claim per group.

S05 Claim authentication: member_id is outside the opaque signed bytes and is treated as an untrusted key selector. The verifier uses it to find trusted public key material, checks the signature over the exact claim_payload bytes, decodes the claim payload, and then checks nonce, instance_uuid/route context, response source/probed endpoint, group ids, and local membership intersection before accepting any route.

S06 Receiver-owned freshness: the sender does not provide the route TTL. The tracker owns introduction refresh interval, probe timeout, reachable lease duration, stale grace period, and retry/backoff. When the receiver lease expires, it performs the full IntroductionRequest/Introduction exchange again because reachability or group memberships may have changed.

S07 Tracking states: Unknown means no active record, Known means a plaintext Peer/endpoint has been observed but not verified, Reachable means at least one signed introduction claim was verified for a local shared group, and Stale means a previously reachable route expired or failed refresh.

S08 Publication rule: only verified Reachable claims that intersect local group membership are exposed to replication as RouteDiscoveryPort PeerRoutes. Known/Stale/non-intersecting peers remain internal tracker state and must not publish usable routes to group broadcast or reliable delivery.

S09 Out of scope for this slice: signed Peer beacons, signed IntroductionRequest messages, sender-provided TTLs, persistent discovery sessions, sequence numbers, and long replay windows.

## Acceptance Criteria

Protocol spec and protobuf shape cover plaintext Peer, plaintext IntroductionRequest with receiver nonce, neutral flotsync.endpoint.v1.EndpointFrame/DiscoveryFrame routing on the verified replication endpoint, signed introduction claims with outer member_id, exact encoded IntroductionClaimPayload transcript bytes, repeated group ids per introduction claim, receiver-owned freshness, Unknown/Known/Reachable/Stale transitions, verification failures, consumer branch-filtering, and exact RouteDiscoveryPort publication/withdrawal rules needed by replication."""
