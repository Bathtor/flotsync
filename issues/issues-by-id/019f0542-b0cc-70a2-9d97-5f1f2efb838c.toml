title = "Retry peer-announcement socket binds after closure or bind failure"
body = "Peer-announcement maintaining components currently treat bind/configure failures and maintained socket closure as terminal. Add a retry cycle so hosts can recover when network availability changes or the configured discovery port is temporarily unavailable. This should distinguish maintained sockets from observe-only components and avoid assuming observed sockets close with the owner."
