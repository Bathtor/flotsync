body = "Outcome agreed. First slice becomes implementation task flotsync-ist.3 under flotsync-ist: exact MemberIdentity plus exact key material, one local authority scope named replication_runtime, capability-based trust evaluation, policy fixed at topology start, conservative defaults, and no hierarchy/revocation implementation yet. The north-star model is deferred to epic flotsync-hitr outside flotsync-ist: concrete device identities as cryptographic principals, parent identities as policy namespaces, evidence plus local policy, capability attenuation, final self-revocation tombstones, non-self revocation as negative evidence, and single-device migration/recovery design."
