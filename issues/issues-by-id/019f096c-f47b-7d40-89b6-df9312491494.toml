id = "019f096c-f47b-7d40-89b6-df9312491494"
ref = "flotsync-ist.1.8"
title = "Design configurable trust policies for key material"
body = """
Design the trust policy model for acquired member key material.

Questions:
Q01. What trust levels exist, and are they attached to keys, identities, sources, groups, or all of these?
Q02. Which policies govern untrusted, observed, paired, invited, introduced, relay-learned, and manually trusted material?
Q03. What operations may each trust level perform: route establishment, bootstrap acceptance, group state installation, update verification, relay lookup, or UI display only?
Q04. How do applications configure policies without Flotsync assuming one product security model?
Q05. How do we prevent key replacement from downgrading or silently changing trust?
Q06. How do parent and child identities inherit or delegate trust, for example trusting bob versus bob.phone or bob.macbook?"""
