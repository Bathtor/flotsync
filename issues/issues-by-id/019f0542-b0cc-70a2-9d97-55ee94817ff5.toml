ref = "flotsync-sec.1"
title = "Scaffold flotsync_security crate and core crypto API"
body = """
Create the flotsync_security workspace crate with the crypto-only API surface for the MVP. The crate should own typed key material, jose-jwk based JWKS/JWK parsing, key role validation, identity key generation helpers, deterministic test-support identities, Ed25519ph sign/verify over streamed SHA-512 transcripts, ChaCha20-Poly1305 group seal/open, HPKE single-shot seal/open for X25519 bootstrap, nonce derivation, transcript construction, and Snafu-derived errors. It must not depend on Kompact, flotsync_io, delivery components, replication store internals, or application config parsing.

## Acceptance Criteria

The new flotsync_security crate builds independently; exposes typed APIs for identity generation, JWKS parsing, Ed25519ph sign/verify, group seal/open, and HPKE single-shot seal/open; includes deterministic test-support helpers; and has unit tests for key role rejection, round-trip key generation, sign/verify failure, group context tampering, ciphertext tampering, wrong context, and HPKE decrypt failure."""
