id = "019f0887-814f-7802-bcf1-5d4fd4e626e0"
ref = "flotsync-6s0-m4"
title = "Add proto byte and buffer decode conveniences"
body = """
Add proto byte, buffer, and serialisation conveniences so byte/IO boundaries can use the unified proto conversion traits without repeating generated-message boilerplate.

Agreed scope M4-1: add slice helpers for DecodeProto, DecodeProtoWith, DecodeProtoView, and DecodeProtoViewWith. Slice helpers should preserve the distinction between protobuf wire decode failures and runtime conversion failures.

Agreed scope M4-2: add Buf helpers only for owned DecodeProto and DecodeProtoWith. Generated protobuf views can only borrow from contiguous slices, so DecodeProtoView helpers remain slice-only.

Agreed scope M4-3: add EncodeProto helpers for owned byte output, including bytes and Vec<u8> return shapes.

Agreed scope M4-4: add a ProtoSerializable<T> wrapper in flotsync_messages::serialisation for T: EncodeProto + Send + Sync + static so EncodeProto values can be handed to lower layers without eager proto conversion.

Agreed scope M4-5: add convenience methods on EncodeProto to create the serialisation wrapper and Arc<dyn FlotsyncSerializable>. Use an explicit wrapper rather than a blanket FlotsyncSerializable impl for EncodeProto because the existing generated-message blanket impl would overlap.

Agreed scope M4-6: keep delivery shallow classification and signed-claim group-id extraction explicit. Those are deliberate partial generated-view inspections rather than repeated full decode boilerplate.

Agreed scope M4-7: keep IoPayload coalescing/cursor choices explicit. Slice helpers should not hide allocation, and Buf helpers should be owned-decode only.

Implementation M4-8: update representative slice/view decode call sites such as discovery peer bytes, introduction claim payload, and WireRuntimeMessage::decode_from_slice.

Implementation M4-9: update stored VersionVector and Update decode in sqlite.rs using phase-preserving helpers so stored protobuf decode errors remain distinct from invalid stored object errors.

Implementation M4-10: update EncodeProto byte output call sites in runtime/store paths to use the new helpers.

Implementation M4-11: add focused tests for slice helpers, Buf helpers, EncodeProto byte helpers, and ProtoSerializable serialisation. Avoid forcing unrelated generated-message paths through the wrapper.

Estimate M4-12: roughly 330-560 LOC, below 1000 LOC."""
