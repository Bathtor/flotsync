ref = "flotsync-git-i20"
title = "Rethink version-vector protobuf transfer shapes"
body = """
Rethink version-vector protobuf transfer shapes around one compact body, one self-describing wrapper, and the established protobuf codec traits.

Agreed holistic plan:

R16. Keep one CompactVersionVector protobuf body containing the full, override, and synchronised representations.

R17. Keep self-describing VersionVector as a non-zero member count plus that compact body, rejecting count/body mismatches.

R18. Replace the public free-function version-vector codec API with compact and self-describing trait-backed adapters implementing EncodeProto, DecodeProto, contextual decode, and borrowed view decode as applicable. The adapters contain only the domain VersionVector and do not model protobuf variants or defer conversion. Private helpers may share representation validation inside the trait implementations.

R19. Decode runtime messages directly with membership context and keep the intermediate Rust wire-vector and delayed wire-message types removed.

R20. Use compact vectors only for frequent group-scoped Update.read_versions and Summary.has_versions traffic. Use self-describing vectors for MigrationProposalPayload.final_versions, SnapshotRef.versions, and SQLite storage.

R21. Make pending invitation and migration proposal payload decoding context-free. Remove old-group member-count lookup, explicit-full count inference, and PendingGroupPayloadDecodeContext. Keep the owned fallback for pending-payload protobuf views; borrowed pending-payload decoding remains deferred to linked follow-up flotsync-git-kmx.

R22. Assign contextual runtime decode results before the failure-handling matches in the runtime component and summary manager, retaining existing failure classification and escalation.

R23. Decode SQLite vectors through the protobuf decode trait and continue validating the stored owning-group count against the self-described count.

R24. Test both transfer forms through trait entry points, member-count validation, all three representations, stored values, and self-describing migration proposals without old-group context. Keep the forced-full-vector workaround removed.

R25. Validate with formatting, focused serial tests, the complete single-threaded replication suite, cargo check, pedantic Clippy, the Rust instruction audit, and git diff --check.

Review-pass estimate:

E26. Trait-based codec refactor: 80-140 changed LOC.

E27. Self-describing proposals and pending-context removal: 90-170 changed LOC, net deletion.

E28. Match, SQLite, protobuf, and test adjustments: 55-110 changed LOC.

E29. Total review-pass churn: approximately 225-420 LOC, likely removing 60-140 net lines. No task split is needed."""
