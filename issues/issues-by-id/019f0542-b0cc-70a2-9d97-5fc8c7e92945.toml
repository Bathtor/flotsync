title = "Add ReplicationStore conformance tests"
body = "Create a reusable public-facing conformance test suite for ReplicationStore implementations. It should encode expected dataset row storage semantics, including tombstone round-trip, missing-to-tombstone acceptance after desync, active-to-tombstone transitions, idempotent tombstone writes, and rejection of tombstone-to-active resurrection. This should be reusable by SQLite and future store implementations rather than duplicated as implementation-local tests."
