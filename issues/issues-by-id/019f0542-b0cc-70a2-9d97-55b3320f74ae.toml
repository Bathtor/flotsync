title = "Secure reliable bootstrap with HPKE and member public keys"
body = """
Secure reliable bootstrap through a reusable delivery security boundary. flotsync_security owns crypto primitives for HPKE bootstrap payloads, signature transcripts, validation material, and encrypted store-secret sealing/opening. flotsync_replication adds a delivery-level security service that owns store access for local private keys, trusted public keys, database-secret encryption keys, bootstrap payload preparation, and inbound bootstrap opening. The runtime component should only provide semantic group/bootstrap intent and install or load ReplicationStore records; it must not construct HPKE transcripts or call flotsync_security bootstrap helpers directly. Reliable delivery should use the security service to seal per-recipient bootstrap envelopes and to open inbound bootstrap envelopes. Bootstrap payload includes group id, ordered members, every member signing public key, every member encryption public key, group cipher suite, and group symmetric key. Inbound bootstrap verifies sender signature, decrypts the HPKE payload, validates public keys against provisioned trusted public keys, writes encrypted group material, and installs group membership only after checks pass.

## Acceptance Criteria

Create-group outbound bootstrap seals per recipient through the delivery security service; inbound bootstrap rejects signature failures, HPKE decrypt failures, and trusted-key mismatches through that same service; stored group records contain encrypted sensitive group-security material and member public keys; runtime observes bootstrap state by loading group records from ReplicationStore and does not own crypto transcript construction; flotsync_security remains the only crate constructing bootstrap cryptographic transcripts; tests cover successful secure bootstrap plus mismatched public key and tampered payload failures."""
