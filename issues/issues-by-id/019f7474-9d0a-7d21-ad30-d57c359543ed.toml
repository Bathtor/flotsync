title = "Redesign activation change delivery for memory-bounded listener batches"
body = """
Redesign activation change delivery so large InitialSnapshot::Inline activations do not require holding every listener row change in memory.

Context:
P01. flotsync-git-pow.4 keeps one listener DataChanged event per activation to avoid pre-commit visibility and partial listener failure semantics.
P02. Large inline or fetched snapshots may require a post-commit path that rederives the change-set and emits batches, each with suitable ReadTokens.

Expected outcome:
P03. Define consistency semantics for activation listener batches after commit.
P04. Bound memory for store patching and listener emission.
P05. Decide whether and where to rederive activation row changes from store after commit."""
