title = "Design session encryption for relay and TCP communication"
body = """
Follow-up after the flotsync_security MVP: design session-oriented encryption for relay or TCP communication where multi-shot HPKE or another session protocol may reduce overhead and provide cleaner stream semantics. This should account for message ordering, retries, reconnects, relay authentication, and how session keys interact with envelope-level group encryption.

## Acceptance Criteria

There is a concrete design for relay or TCP session encryption, including handshake, key lifecycle, ordering assumptions, reconnect behaviour, failure handling, and tests or follow-up implementation tasks."""
