title = "Evaluate certificate or PKI-based trust for flotsync_security"
body = """
Follow-up after the flotsync_security MVP: decide whether Flotsync should support certificates, PKI, or another structured trust model beyond copied public JWKS files and discovery-published keys. This should compare operational complexity, mobile or desktop UX, local-first expectations, revocation, and compatibility with existing MemberIdentity values.

## Acceptance Criteria

There is a written decision or implementation plan for whether certificate or PKI support belongs in Flotsync, how it maps to MemberIdentity, how revocation would work, and what remains intentionally unsupported."""
