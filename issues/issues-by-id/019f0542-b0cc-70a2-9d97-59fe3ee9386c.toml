ref = "flotsync-3ec"
title = "Support LatestValueWins initial values in insert_row"
body = "The new TableOperations::insert_row API currently cannot materialize initial LatestValueWins values because LinearLatestValueWins::new requires three distinct internal ids while insert_row only receives one operation_id. Decide the API for supplying or deriving those ids and implement LVW inserts without a temporary UnsupportedOperationVariant."
status = "closed"
status_reason = "Resolved by switching LatestValueWins operation ids to IdWithIndex, allowing insert_row to synthesize the initial LVW ids from one operation id."
