id = "019f0542-b0cc-70a2-9d97-56b0d071b0f9"
ref = "flotsync-la6"
title = "Replace InMemoryData schema Cow with SchemaSource"
body = "flotsync_data_types::schema::datamodel::InMemoryData currently stores its schema as Cow<'static, Schema>, while SchemaSource lives in flotsync_replication::api. This split is causing unnecessary schema cloning at call sites that need to cross between the two representations, for example where SchemaSource gets turned back into an owned Schema before building InMemoryData. Create a dedicated change to move SchemaSource into the datamodel area and switch InMemoryData to store SchemaSource directly instead of Cow<'static, Schema>. The work should cover constructors and snapshot/decode helpers, update affected call sites, and preserve the existing static-versus-shared ownership behaviour while avoiding avoidable schema clones."
status = "closed"
status_reason = "Completed; SchemaSource moved into datamodel and InMemoryData now stores SchemaSource directly while preserving static/shared schema ownership."
type = "task"
priority = 1
