title = "Standardise async test support with eventually-style waits and shared harnesses"
body = """
Create one shared test-support layer for flotsync_io, flotsync_udpour, and flotsync_replication that replaces the current ad-hoc polling loops and fragmented harness code. Scope includes an eventually-style helper for predicate-based waiting, shared buffered probe utilities for mpsc-backed event streams, common Kompact lifecycle helpers, and reusable transport/harness fixtures so crates stop re-implementing near-identical test infrastructure.

## Acceptance Criteria

There is one sanctioned eventually-style wait helper used across the targeted crates; duplicated buffered receiver and polling helpers are removed or folded into shared support; new or migrated tests use the shared harness abstractions rather than crate-local bespoke fixtures."""
