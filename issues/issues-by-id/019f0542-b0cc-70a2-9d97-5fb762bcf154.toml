title = "Make ReadToken opaquely serialisable"
body = "Follow-up to flotsync-0ns. The first manual-slice ReadToken can be an opaque in-memory API value because replicated-checklist is in-memory, but later slices need applications to persist and restore tokens without inspecting replication group scoping. Design and implement opaque serialisation/deserialisation for ReadToken with versioning and validation against the runtime/store state."
