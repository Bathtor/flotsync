id = "019f5761-b690-7ee0-9d3a-416aa365e213"
ref = "flotsync-git-gkd"
title = "Add collection helpers for protobuf codecs"
body = """
Add symmetric collection helpers to the established protobuf codec traits and adopt them wherever collection conversion is a direct application of those traits.

Agreed holistic plan:

P1. Add EncodeProto::encode_proto_collection. It accepts borrowed values and returns any FromIterator collection of owned generated protobuf messages. It covers 9 current production call sites.

P2. Add DecodeProto::decode_proto_collection. It consumes owned generated messages, preserves element order and first-error propagation, and returns any FromIterator runtime collection. It covers 3 current production call sites.

P3. Add DecodeProtoView::decode_proto_view_collection. It accepts iterators over generated borrowed views without owning those protobuf messages. It covers 3 current production call sites.

P4. Add DecodeProtoWith::decode_proto_collection_with. It copies one Copy context for each owned element and covers 4 current production call sites. The Copy restriction makes the repeated per-element cost explicit and limits this convenience to cheap values or references instead of hiding potentially expensive clones.

P5. Add DecodeProtoViewWith::decode_proto_view_collection_with. It combines borrowed-view iteration with the same Copy-context restriction and covers 4 current production call sites.

P6. Adopt P1-P5 across the 23 direct production conversions in flotsync_replication and flotsync_discovery. Preserve generic FromIterator output so Vec and SmallVec call sites infer their existing collection types.

P7. Leave 13 custom collection-shaped codec sites explicit: 3 group-setup member-key conversions, 2 checked group-schema decoders, 3 initial-row field conversions, 3 member-identity wire conversions, 1 stored dataset-update adapter, and 1 raw schema-operation view materialisation. Do not add mapping-closure overloads for these cases because their conversion-specific logic should remain visible.

P8. Add flotsync_messages unit tests covering empty and ordered collections, generic output collection types, owned and borrowed-view decoding, contextual decoding, and first-error propagation.

P9. Validate with formatting, flotsync_messages tests, the complete serial replication suite, all-target cargo checks, pedantic Clippy, the Rust instruction audit, and git diff checks.

Concrete API:

- EncodeProto::encode_proto_collection<'a, C>(values: impl IntoIterator<Item = &'a Self>) -> C where Self: 'a, C: FromIterator<Self::Proto>.
- DecodeProto::decode_proto_collection<C>(protos: impl IntoIterator<Item = Self::Proto>) -> Result<C, Self::Error> where C: FromIterator<Self>.
- DecodeProtoView::decode_proto_view_collection<'proto, 'view, C>(protos: impl IntoIterator<Item = &'view Self::ProtoView<'proto>>) -> Result<C, Self::Error> where 'proto: 'view, Self::ProtoView<'proto>: 'view, C: FromIterator<Self>.
- DecodeProtoWith::decode_proto_collection_with<C>(protos: impl IntoIterator<Item = Self::Proto>, context: Context) -> Result<C, Self::Error> where Context: Copy, C: FromIterator<Self>.
- DecodeProtoViewWith::decode_proto_view_collection_with<'proto, 'view, C>(protos: impl IntoIterator<Item = &'view Self::ProtoView<'proto>>, context: Context) -> Result<C, Self::Error> where 'proto: 'view, Self::ProtoView<'proto>: 'view, Context: Copy, C: FromIterator<Self>.

Coverage and priority:

- P1-P3 cover 15 of 23 direct cases with the smallest API surface.
- P4-P5 cover the remaining 8 direct contextual cases. All four current production context shapes are Copy, so tightening Clone to Copy requires no call-site changes.
- Together P1-P5 remove all direct EncodeProto/DecodeProto collection boilerplate while retaining the 13 intentionally custom conversions.
- Single-value contextual decode APIs continue to support non-Copy contexts; only the collection conveniences are restricted.

Estimated change size:

P10. Trait methods and documentation: approximately 75-125 changed LOC, including the Copy-bound review refinement.

P11. Tests and call-site adoption: approximately 210-340 changed LOC, with the call-site portion expected to be a net deletion.

P12. Total: approximately 285-465 changed LOC, below 1,000 LOC; no task split is needed."""
