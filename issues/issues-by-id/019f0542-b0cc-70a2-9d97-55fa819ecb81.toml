id = "019f0542-b0cc-70a2-9d97-55fa819ecb81"
ref = "flotsync-6s0"
title = "Introduce runtime message proto conversion trait"
body = """
Runtime message encoding/decoding currently uses ad hoc to_proto/from_proto helpers for Update, Summary, and related wire forms. Turn this into a small, consistent conversion API so runtime message types have one obvious path into and out of the generated protobuf structures.

Context A: the cleanup should reduce duplicated conversion code without hiding ownership costs. Keep the conversion surface explicit enough that callers can see when data is borrowed, cloned, encoded into owned protobuf buffers, or decoded into runtime-owned structures.

Direction B: establish a new mechanism, not a one-time cleanup pass. The conversion API should force future runtime protobuf conversions into consistent shapes while still allowing separate mechanisms for owned proto conversion, generated borrowed view decode, and borrowed source encode adapters.

Reminder C: local buffa 0.3 generated views are decode-side views: generated View types implement buffa::MessageView with decode_view and to_owned_message. I found no generated ViewEncode trait in the installed buffa sources, so encode-side borrowed support should be modelled through explicit typed source adapters rather than assumed generated view encoding.

Agreed split D: implementation is split into three child tasks.

Child D1: flotsync-6s0-m1 introduces the baseline owned proto conversion trait family: EncodeProto, DecodeProto, DecodeProtoWith<Context>, plus MemberCountContext for contextual decode.

Child D2: flotsync-6s0-m2 adds generated borrowed proto view decode traits on top of M1. It is blocked by flotsync-6s0-m1.

Child D3: flotsync-6s0-m3 adds explicit borrowed proto source encode adapters on top of M1. It is blocked by flotsync-6s0-m1 and is independent of M2.

Acceptance E: the child tasks should leave conversion call sites clearer than the current ad hoc helpers, include focused tests for representative encode/decode paths, document any cases where cloning or allocation remains intentionally required, and avoid broad blanket impls that obscure allocation behaviour."""
