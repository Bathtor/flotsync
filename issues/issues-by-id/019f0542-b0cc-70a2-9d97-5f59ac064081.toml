title = "Design migration UX for secure group changes"
body = """
Follow-up after the flotsync_security MVP: design the user and application-facing migration experience for secure group changes. This should cover how users review member additions or removals, how public keys are displayed or verified, how new group ids and group keys are accepted, and how applications handle denial or delayed acceptance.

## Acceptance Criteria

There is a concrete migration UX and API design covering user-mediated trust decisions, key display or verification, accept/reject flows, new group id installation, and failure handling; implementation tasks can be derived from it."""
