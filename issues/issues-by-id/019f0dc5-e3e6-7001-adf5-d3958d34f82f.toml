id = "019f0dc5-e3e6-7001-adf5-d3958d34f82f"
ref = "flotsync-ist.9"
title = "Add replicated-checklist store-native key setup commands"
body = """
Implement the agreed replicated-checklist key setup convenience flow from flotsync-ist.1.10. This removes the example dependency on JWKS key files and gives manual testing a store-native path for local keys, public bundles, trust, blocking, and inspection.

Agreed direction:
A01. Replace the current generate-keys JWKS flow with a top-level keys command family on the replicated-checklist binary.
A02. Key setup commands stay outside the REPL because they must work before the replication runtime starts.
A03. The first command set is: run <config>, keys init-local <config>, keys export-local <config>, keys inspect <config> <public-bundle>, keys trust <config> <member-id> <public-bundle>, keys list <config>, and keys block <config> <fingerprint>.
A04. No reset-local command in this slice. Manual recovery can remain deleting the whole example store followed by keys init-local.
A05. run <config> must fail loudly when local identity keys are missing, with an actionable message pointing to keys init-local <config>. It must not silently create fresh local identity keys.
A06. keys init-local <config> creates local private key material in the configured store for local-member if absent, then prints the local public bundle and fingerprint. Existing matching keys are reused and printed.
A07. keys export-local <config> prints the local member id, canonical public bundle string, canonical padded fingerprint string, and grouped display fingerprint. Output must clearly mark the public bundle as the copy-paste value needed for manual setup and mark fingerprints/member id as informational verification context.
A08. keys inspect <config> <public-bundle> decodes without trusting. It prints schemes, fingerprint, display fingerprint, known identity bindings, whether the fingerprint is globally blocked, whether any binding is trusted/untrusted, and conflicts with current local knowledge.
A09. keys trust <config> <member-id> <public-bundle> decodes, derives the fingerprint, stores the bundle if needed, and records positive trust/evidence for exactly (member-id, fingerprint). It accepts bundles, not fingerprint-only approvals, in this slice.
A10. keys trust warns if the fingerprint is already bound to another identity or the identity already has other fingerprints.
A11. keys list <config> prints local keys and known remote key bindings, including untrusted and blocked entries by default.
A12. keys block <config> <fingerprint> records a global blocked-key decision by fingerprint. It must not delete key material or identity bindings.
A13. The config stops carrying local-private-jwks-path and trusted-public-jwks-paths. It keeps local-member, store-path, store-secret-profile, group-id, ordered-members, and runtime networking config.
A14. The example remains exact-device-identity only. Names like alice.phone are just explicit MemberIdentity values; no parent trust inheritance or generated subidentity mechanism is implied.

Acceptance criteria:
B01. The replicated-checklist CLI exposes the agreed keys subcommands and removes the JWKS generate-keys command.
B02. Example config parsing no longer requires local-private-jwks-path or trusted-public-jwks-paths.
B03. run <config> fails with an actionable error when local key material is missing instead of generating keys implicitly.
B04. init-local and export-local support manual copy-paste setup and clearly distinguish copyable public bundle output from informational verification output.
B05. inspect reports decoded bundle metadata, fingerprint strings, known bindings, trust summaries, conflicts, and global blocked status without granting trust.
B06. trust records positive trust for an explicit MemberIdentity plus bundle-derived fingerprint and rejects or warns on ambiguous/conflicting local state as appropriate.
B07. block records global blocked state by fingerprint and authority checks treat blocked fingerprints as rejected everywhere.
B08. list includes trusted, untrusted, and blocked state so manual tests do not hide security-relevant records.
B09. Tests cover command parsing, config cleanup, missing-local-key run failure, init/export roundtrip, inspect without trust, trust with explicit identity, global block, and removed JWKS config paths.

Estimate: roughly 400-800 LOC across CLI parsing, runner plumbing, config cleanup, trust/store API calls, output formatting, and focused tests."""
