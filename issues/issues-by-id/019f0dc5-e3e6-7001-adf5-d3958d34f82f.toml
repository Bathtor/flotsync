id = "019f0dc5-e3e6-7001-adf5-d3958d34f82f"
ref = "flotsync-ist.9"
title = "Add replicated-checklist store-native key setup commands"
body = """
Implement the agreed replicated-checklist store-native key setup flow from flotsync-ist.1.10, narrowed after planning to the commands needed for the first manual setup CUJ. The goal is to remove the example dependency on JWKS key files and provide a store-native path to initialise local keys, export a copyable public bundle, inspect received bundles, record explicit trust, record global blocks, and run the checklist peer from stored key material.

Agreed scope:
P01. Keep run <config>.
P02. Add top-level keys init-local <config>, keys export-local <config>, keys inspect <config> <public-bundle>, keys trust <config> <member-id> <public-bundle>, and keys block <config> <fingerprint>.
P03. Do not implement keys list in this slice. Full key-state inventory belongs to a later diagnostic/manual-test CUJ and would require new enumeration APIs that are not needed yet.
P04. Key setup commands stay outside the REPL because they must work before the replication runtime starts.
P05. No reset-local command in this slice. Manual recovery can remain deleting the whole example store followed by keys init-local.
P06. run <config> must fail loudly when local identity keys or the configured static group are missing, with an actionable message pointing to keys init-local <config>. It must not silently create fresh local identity keys.
P07. keys init-local <config> creates local private key material in the configured store for local-member if absent, initialises the configured static group when missing, then prints the local public bundle and fingerprints. Existing matching keys are reused and printed.
P08. keys export-local <config> prints the local member id, canonical public bundle string, canonical padded fingerprint string, and grouped display fingerprint. Output clearly marks the public bundle as the copy-paste value and marks fingerprints/member id as informational verification context.
P09. keys inspect <config> <public-bundle> decodes without trusting. It prints schemes, fingerprint forms, known identity bindings for that fingerprint, whether the fingerprint is globally blocked, trust/untrusted status for reported bindings, permission decisions, and conflicts with current local knowledge.
P10. keys trust <config> <member-id> <public-bundle> decodes, derives the fingerprint, stores the bundle if needed, and records positive trust/evidence for exactly (member-id, fingerprint). It accepts bundles, not fingerprint-only approvals, in this slice.
P11. keys trust warns if the fingerprint is already bound to another identity or the identity already has other fingerprints.
P12. keys block <config> <fingerprint> records a global blocked-key decision by fingerprint. It must not delete key material or identity bindings.
P13. The config remains store-native: local-member, store-path, store-secret-profile, group-secret-password while the temporary static-group bridge exists, group-id, ordered-members, and runtime networking config. local-private-jwks-path and trusted-public-jwks-paths remain absent.
P14. The example remains exact-device-identity only. Names like alice.phone are explicit MemberIdentity values; no parent trust inheritance or generated subidentity mechanism is implied.

Implementation plan:
P15. Add the top-level keys command parser and dispatch.
P16. Add shared setup helpers for config loading, store-secret loading, store opening, and pre-runtime command execution.
P17. Add local-key initialisation and static-group initialisation for fresh stores, reusing existing key-generation, encryption, and group-security helpers.
P18. Add export, inspect, trust, and block command handlers using existing PublicKeyBundle, fingerprint, trust evidence, blocked-fingerprint, and permission-reporting APIs.
P19. Keep key-state enumeration/listing out of this task.
P20. Add focused tests for command parsing, config cleanup, missing setup run failure, init/export roundtrip, inspect without trust, trust with explicit identity, and global block handling.

Acceptance criteria:
P21. The replicated-checklist CLI exposes the agreed commands and has no JWKS generate-keys command.
P22. Example config parsing does not require or accept local-private-jwks-path or trusted-public-jwks-paths as first-class example config.
P23. run <config> fails with an actionable key setup error when local key material or static-group setup is missing.
P24. init-local and export-local support manual copy-paste setup and clearly distinguish copyable public bundle output from informational verification output.
P25. inspect reports decoded bundle metadata, fingerprint strings, known bindings for that fingerprint, trust summaries, conflicts, and global blocked status without granting trust.
P26. trust records positive trust for an explicit MemberIdentity plus bundle-derived fingerprint and warns on ambiguous/conflicting local state where relevant.
P27. block records global blocked state by fingerprint and existing authority checks continue to reject blocked fingerprints everywhere.
P28. Tests cover the agreed command and setup behaviours.

Estimate: roughly 650-950 LOC across CLI parsing, runner plumbing, setup commands, output formatting, and focused tests. The removed keys list scope avoids the expected extra store enumeration APIs and keeps the slice below the 1000 LOC warning line unless test scaffolding grows unexpectedly."""
