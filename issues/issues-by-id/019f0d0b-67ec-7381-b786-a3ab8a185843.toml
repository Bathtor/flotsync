id = "019f0d0b-67ec-7381-b786-a3ab8a185843"
ref = "flotsync-ist.6"
title = "Verify introduction claims by key fingerprint"
body = """
Implement the minimum discovery key-material layer from flotsync-ist.1.3 and flotsync-ist.1.7: IntroductionClaims must identify the concrete key material used for the signature by carrying the KeyFingerprint of the signing public key bundle alongside the member identity.

Agreed direction:
A01. Route establishment must verify introduction claims against exact stored key material, not only member_id.
A02. Signed IntroductionClaimPayloads carry member_id, route claim, group ids, and the signer public key bundle KeyFingerprint.
A03. The wire/protobuf representation carries the 32 raw fingerprint bytes. Padded base64url canonical strings and grouped display strings are API/display helpers from flotsync-ist.8, not discovery-wire payloads.
A04. If the exact key material for (member_id, fingerprint) is stored and not blocked, route establishment may accept the route for a narrow route_identity authority scope.
A05. Accepting route_identity does not grant replication_runtime, group install, introducer, or bootstrap authority.
A06. Unknown fingerprints produce untrusted observations and do not accept the route until matching key material is acquired and policy permits route_identity.
A07. Parent/child identity inheritance is not applied; fingerprints bind exact device/member identities.

Acceptance criteria:
B01. Discovery wire/protobuf messages include the signing key bundle fingerprint bytes in introduction claims.
B02. Claim verification selects trusted/stored key material by exact member_id plus fingerprint.
B03. Unknown, blocked, or mismatched fingerprints reject route publication and record/emit an untrusted observation where appropriate.
B04. Existing route establishment tests cover known fingerprint acceptance, unknown fingerprint rejection, wrong-key rejection, and blocked-key rejection.
B05. No replication_runtime authority is granted by this path alone.

Estimate: roughly 300-600 LOC across discovery protobuf, route establishment verification, trust lookup integration, and tests."""
