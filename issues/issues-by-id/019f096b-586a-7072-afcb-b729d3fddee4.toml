title = "Design key-material discovery and trust model"
body = """
Design tracker for flotsync-ist. Resolve key-material exchange mechanisms, trust policies, DB-native key formats, hierarchical identity trust, and example provisioning before implementation.

Scope:
D01. Compare user/application key exchange mechanisms without assuming Flotsync owns UI.
D02. Define policy knobs for how acquired key material is trusted and what untrusted material may do.
D03. Decide whether JWKS can be removed entirely from runtime, storage, config, examples, and dependencies.
D04. Define how segmented MemberIdentity values model conceptual users, devices, and trust inheritance.
D05. Split implementation into smaller follow-up tasks only after the design choices are agreed.

Estimate: design-only issue; implementation follow-ups are expected to exceed 1000 LOC if kept together."""
