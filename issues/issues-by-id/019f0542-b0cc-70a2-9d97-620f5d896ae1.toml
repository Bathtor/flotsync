title = "Precompute canonical group crypto context if hot"
body = "Follow-up from flotsync_security review. group_nonce and group_aad now encode sender identity directly from Identifier segments rather than allocating sender.to_string(), but both paths still rebuild the canonical context bytes on each seal/open. If group traffic becomes hot, introduce a small precomputed context type so nonce derivation, AAD construction, and signature transcripts can reuse canonical frame/member context bytes without repeated segment iteration or temporary encoding."
