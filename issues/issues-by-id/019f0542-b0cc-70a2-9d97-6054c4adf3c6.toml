title = "Revisit mailbox fetch pagination design"
body = "Mailbox fetch pagination was removed from flotsync-zup to avoid baking in cursor semantics before the mailbox subsystem design is mature. Revisit whether mailbox fetches should be full fetches, monotonic sequence cursors, continuation tokens, or some other stateless paging model once mailbox storage, acknowledgement, and relay semantics are clearer."
