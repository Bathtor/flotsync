title = "Persist and replay pending invitation decisions"
body = """
Persist pending GroupInvitation and MigrationProposal decisions and replay unresolved listener events on startup.

Scope:
A. Store pending decision records for direct invitations and migration proposals.
B. Store accepted-but-not-active activation state separately from pending user decisions.
C. Re-fire pending listener events after restart until accepted or rejected.
D. Resume accepted activation work after restart without re-asking the listener.
E. Make responder decisions idempotent by group invitation identity or MigrationId.
F. Preserve enough initial_snapshot metadata for later activation work.

Out of scope:
G. Chunked snapshot payload persistence.
H. Full migration runtime behaviour beyond state transitions needed by this slice."""
