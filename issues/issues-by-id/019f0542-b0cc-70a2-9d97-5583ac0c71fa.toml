ref = "flotsync-sec.7"
title = "Add replicated-checklist key generation and secure config docs"
body = """
Update replicated-checklist so users can generate local identity JWKS files through the CLI and configure secure peers without external crypto tooling. Extend example config parsing and docs for this MVP slice to include the temporary plaintext local database secret, local private identity JWKS path, and trusted public JWKS paths. Scenario docs should show first-run key generation and setup that provisions the store before replication starts.

## Acceptance Criteria

CLI exposes a key-generation command using flotsync_security; generated private/public JWKS files round-trip through example setup; example configs document temporary plaintext local database secret plus local/trusted JWKS paths; scenario docs show secure multi-peer setup and make clear the plaintext database secret is MVP-only pending keyring; tests cover relative/absolute key paths and config validation."""
