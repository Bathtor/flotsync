title = "Implement protobuf snapshot visitors and dataset decoders"
body = """
Implement SchemaSnapshotEncoder, SchemaSnapshotDecoder, DataSnapshotEncoder, and DataSnapshotDecoder in flotsync_messages for the specialized protobuf format, following the existing schema/datamodel snapshot flow end to end.

## Acceptance Criteria

1) flotsync_messages provides working protobuf-backed implementations of the schema snapshot visitor and decoder traits. 2) Dataset-level row encoding and lazy row decoding work through InMemoryData encode_data_snapshots and decode_data_snapshots. 3) The implementation uses the specialized snapshot payload codecs rather than per-CRDT bespoke paths."""
