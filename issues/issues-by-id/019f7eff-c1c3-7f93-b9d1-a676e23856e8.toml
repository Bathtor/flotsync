title = "Decode pending group payloads directly from borrowed protobuf views"
body = """
Decode pending-group runtime payloads directly from generated borrowed protobuf views, without first converting the complete invitation or proposal into its owned protobuf form.

Agreed holistic plan:

K1. Implement DecodeProtoView directly for GroupInvitationMessage and MigrationProposalMessage. Update RuntimeMessage view decoding to call those traits and remove the complete-message to_owned_message fallbacks and follow-up TODOs.

K2. Add borrowed decoders for GroupInvitation and MigrationProposal. Parse borrowed group ids, invitation source, proposed members, and optional strings directly, allocating only the owned domain values required by the resulting objects.

K3. Add borrowed trait implementations through dataset schemas and the initial-snapshot graph, including inline rows, metadata, and snapshot references. Extend the self-describing version-vector adapter with DecodeProtoView. Reuse the existing borrowed GroupSetupMessage decoder.

K4. Convert only nested schema definitions and row-field protobuf values to owned messages where the existing datamodel decoders require ownership. Do not introduce new wire-domain representations.

K5. Extract small shared construction or validation helpers where the owned and borrowed paths would otherwise duplicate domain invariants. Keep protobuf conversion entry points on the established codec traits.

K6. Test invitation and proposal runtime decoding with empty, inline, and metadata snapshots; cover all self-describing vector representations; compare owned and borrowed results; and retain malformed-field plus member/setup validation coverage.

K7. Validate with formatting, focused serial codec tests, the complete serial replication suite, all-target cargo check, pedantic Clippy, the Rust instruction audit, and git diff checks.

Estimated change size:

K8. Codec implementation: approximately 315-550 changed LOC.

K9. Tests: approximately 100-180 changed LOC.

K10. Total: approximately 415-730 changed LOC, below 1,000 LOC; no task split is needed."""
