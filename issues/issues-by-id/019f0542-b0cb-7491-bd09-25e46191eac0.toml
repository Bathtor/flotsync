title = "Initial route transport extraction into temporary crate"
body = """
Slice S01 from flotsync-idcz. This slice already created the initial flotsync_route_transport crate and moved the current route transport contracts, RouteTransportManager, and manager tests out of flotsync_replication::delivery::route_transport. It also moved or redefined RouteSendId and RelayIdentity so route transport no longer depends on flotsync_replication internals.

This was an initial extraction under the temporary crate name flotsync_route_transport. S02 will rename the crate to flotsync_routes and move the remaining route-owned discovery modules into it.

Route establishment behaviour stays unchanged in this slice; introductions still use raw UDP until S03.

Current repo state to account for: route transport already has explicit ExternalUdpSocketRegistration and ignores unregistered external UDP binds; preserve that behaviour in later slices.

Estimated size was 700-1200 LOC touched, mostly file moves, import rewrites, and moved tests.

## Acceptance Criteria

A01 A temporary flotsync_route_transport crate is a workspace member.
A02 Route transport contracts, manager, config keys, and manager tests build from that crate.
A03 flotsync_replication consumes route transport from that crate instead of owning the implementation.
A04 flotsync_replication no longer depends directly on flotsync_udpour unless another remaining path requires it.
A05 Existing explicit endpoint registration behaviour and route transport manager tests still pass.
A06 cargo fmt, relevant tests, and pedantic clippy for touched crates pass.
A07 Later slices treat the crate name as temporary and rename it to flotsync_routes."""
