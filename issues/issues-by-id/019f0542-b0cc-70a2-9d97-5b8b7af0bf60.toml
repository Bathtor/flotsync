title = "Persist local updates before returning PublishReceipt once durability exists"
body = "The first replication slice currently returns PublishReceipt once local in-memory state has been accepted and the outbound delivery submit has been issued. Once the replication runtime has a durable persistence layer, publish_changes should persist the local update before returning the receipt so the acknowledgement reflects durable local acceptance rather than only in-memory mutation."
