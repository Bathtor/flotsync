title = "Implement protobuf snapshot payload codecs for the datamodel surface"
body = """
Implement specialized protobuf encode and decode helpers for all schema snapshot value shapes, including state values, NullableBasicValue, PrimitiveValueArray, SnapshotNode payloads, IdWithIndex<UpdateId>, tombstones, and boundary nodes.

## Acceptance Criteria

1) Snapshot payload codecs cover every value shape needed by SchemaSnapshotEncoder and SchemaSnapshotDecoder. 2) Primitive-specialized array encodings are implemented for efficient wire layout. 3) History node codecs preserve stable link, tombstone, and boundary-node semantics."""
