title = "Generate borrowed view types for structs"
body = """
# Generate borrowed view types for structs

Implement a proc-macro derive (e.g. `#[derive(View)]`) that generates a borrowed view variant of a struct, where owned fields become borrowed equivalents.

Example:

```rust
#[derive(View)]
struct User {
    id: u64,
    name: String,
    tags: Vec<Tag>,
}
```

expands to:

```rust
struct UserView<'a> {
    id: &'a u64,
    name: &'a str,
    tags: &'a [Tag],
}

impl User {
    fn view(&self) -> UserView<'_>;
}
```

The derive should map common owned types to their ergonomic borrowed forms (`String -> &str`, `Vec<T> -> &[T]`, etc.) while leaving other types as `&T`."""
