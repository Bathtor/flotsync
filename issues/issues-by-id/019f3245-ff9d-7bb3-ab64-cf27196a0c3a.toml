title = "Generate borrowed view types for structs"
body = """
# Generate borrowed view types for structs

Use the published `borrowize` crate to replace suitable manual borrowed protobuf source structs with generated borrowed view types.

Agreed scope:
- Add `borrowize` as a workspace dependency and use it from `flotsync_routes` and `flotsync_replication`.
- In `flotsync_routes`, rename the owned decoded key-bundle lookup response payload to the natural domain name and let `borrowize` generate the default borrowed view type. Update current response-payload source use-sites to the generated default name.
- Keep `DiscoveryEndpointFrameSrc` manual for now. Follow-up `flotsync-git-g8w` tracks replacing it when `borrowize` supports enums.
- In `flotsync_replication`, derive borrowed views for the runtime protobuf source structs where there is a clear owned named-field source shape. Keep manual enum and record adapters where `borrowize` cannot represent the shape cleanly.
- Keep `RuntimeVersionVectorProtoSource` as an explicit adapter; a direct `EncodeProto` impl for `&VersionVector` is blocked in this crate by the orphan rule and moving the impl elsewhere is out of scope.
- Preserve existing protobuf bytes and tests around owned and borrowed source encodings.

Estimated touched production code remains well below 1000 LOC."""
