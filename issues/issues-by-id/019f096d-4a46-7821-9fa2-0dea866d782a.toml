id = "019f096d-4a46-7821-9fa2-0dea866d782a"
ref = "flotsync-ist.1.10"
title = "Design replicated-checklist key setup convenience"
body = """
Design replicated-checklist convenience flows for key setup, testing, and fast reset after JWKS files are removed. The public key bundle format is settled by flotsync-ist.1.2 and implemented by flotsync-ist.8, so this task focuses on commands and example workflow ergonomics.

Settled inputs from flotsync-ist.1.2:
RC01. The example should stop relying on JWKS files once PublicKeyBundle support from flotsync-ist.8 exists.
RC02. Convenience commands should expose and accept pasteable base64 PublicKeyBundle strings produced by the flotsync_security helper APIs.
RC03. The bundle string does not contain MemberIdentity; the example supplies identity through config, command arguments, or explicit user choice.
RC04. Inspect commands should decode a bundle without granting trust and report fingerprint, algorithms, known identity bindings, ambiguity, mismatches, blocked status, and current trust/evidence summaries where available.
RC05. Trust commands should record evidence for an explicit MemberIdentity plus fingerprint. Decoding, importing, or displaying a bundle must not grant authority by itself.
RC06. Multiple fingerprints per identity and reused fingerprints across identities must remain visible in the example so manual tests can cover blocked keys and ambiguous bindings.

Remaining questions:
RC07. Which concrete commands should create local keys, export local public bundles, inspect pasted bundles, trust explicit identity/fingerprint pairs, list trust state, and reset example state?
RC08. What is the fastest manual recovery path after deleting the store or changing incompatible test data, now that key material lives in the store?
RC09. Which mechanisms should the example exercise first: pasteable invite, QR-ready bundle, untrusted discovery, introducer, or bootstrap trust policy?
RC10. Should the example model one identity per device initially, or also expose parent/device examples such as bob and bob.laptop for future hierarchy design?
RC11. How should the example surface blocked keys so users can recover test state intentionally without hiding the semantics we want in production?"""
