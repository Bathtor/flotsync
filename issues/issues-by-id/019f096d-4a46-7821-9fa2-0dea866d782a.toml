author = "lkroll"
body = """
Resolved as implementation work in flotsync-ist.9, with supporting updates in flotsync-ist.3 and flotsync-ist.8.

Decision summary:
CK01. The replicated-checklist binary gets a top-level keys command family, not REPL-only setup commands.
CK02. The first command set is keys init-local, keys export-local, keys inspect, keys trust, keys list, and keys block.
CK03. The current generate-keys JWKS flow is replaced rather than extended.
CK04. export-local must clearly distinguish the public bundle value that needs copy-pasting from informational member id and fingerprint output.
CK05. run fails loudly when local identity keys are missing and points users to keys init-local; it does not silently generate new identity keys.
CK06. No reset-local command in this slice. Manual recovery can remain deleting the store and running keys init-local.
CK07. Positive trust remains exact MemberIdentity plus fingerprint and requires a bundle in this slice. Fingerprint-only positive trust approval is deferred.
CK08. Blocking is global by fingerprint, not by identity plus fingerprint. Blocked key material is rejected everywhere and must not be hidden by deleting an identity binding.
CK09. keys block is included, but depends on the basic known/trusted/blocked key-state support in flotsync-ist.3.
CK10. The checklist config drops local-private-jwks-path and trusted-public-jwks-paths once the new store-native flow exists.
CK11. The example remains exact-device-identity only. Names such as alice.phone are explicit MemberIdentity values, not generated subidentities or inherited parent trust.
CK12. No existing dedicated task covered fresh user ids, device ids, and readable aliases; created deferred task flotsync-git-h13 and linked it to flotsync-hitr."""
