syntax = "proto3";

package flotsync.replication.v1;

import "flotsync/datamodel/v1/datamodel.proto";
import "flotsync/discovery/v1/discovery.proto";
import "flotsync/versions/v1/versions.proto";

// Internal replication-runtime payloads carried inside delivery envelopes.
//
// These are not the full replication protocol; they are only the narrow
// bootstrap plus live-update messages used by the first end-to-end slice.
// Producer and group version values reserve u64::MAX as an exhaustion sentinel;
// runtimes reject that value in Update, Summary, and NeedRange payloads.
message RuntimeMessage {
  oneof body {
    BootstrapGroup bootstrap_group = 1;
    Update update = 2;
    SummaryRequest summary_request = 3;
    Summary summary = 4;
    NeedRange need_range = 5;
    UpdateBatch update_batch = 6;
  }
}

// Fixed-membership bootstrap message delivered reliably before live updates.
message BootstrapGroup {
  bytes group_id = 1;

  // Canonical group-member order.
  //
  // This repeated field is semantically ordered. The replication runtime uses
  // the preserved protobuf element order as the canonical member index order
  // for the group.
  repeated flotsync.discovery.v1.Identifier members = 2;
}

// One causal replication update delivered through GroupBroadcast.
message Update {
  bytes group_id = 1;
  flotsync.datamodel.v1.HistoryId update_id = 2;

  // Version vector the sender observed before applying this update locally.
  //
  // Receivers use this together with the canonical group membership to enforce
  // dependency satisfaction before applying the batch.
  flotsync.versions.v1.VersionVector read_versions = 3;

  repeated DatasetUpdate dataset_updates = 4;
}

// Request a peer's currently applied group version vector.
message SummaryRequest {
  bytes group_id = 1;
  bytes correlation_id = 2;
}

// Current applied group version vector for one responding peer.
message Summary {
  bytes group_id = 1;
  bytes correlation_id = 2;
  flotsync.versions.v1.VersionVector has_versions = 3;
}

// Best-effort request for one or more missing producer update ranges.
message NeedRange {
  bytes group_id = 1;
  repeated UpdateRange ranges = 2;
}

// Inclusive version range for one producer inside a replication group.
//
// If end_version is absent, the range contains exactly start_version.
// If end_version is present, it must be greater than or equal to start_version.
// Groups should rotate long before a producer reaches the reserved exhaustion
// value.
message UpdateRange {
  uint32 producer_index = 1;
  uint64 start_version = 2;
  optional uint64 end_version = 3;
}

// Best-effort catch-up fulfilment containing already stored updates.
message UpdateBatch {
  bytes group_id = 1;
  repeated Update updates = 2;
}

// All schema operations for one dataset within a single update.
message DatasetUpdate {
  string dataset_id = 1;
  repeated flotsync.datamodel.v1.SchemaOperation operations = 2;
}
