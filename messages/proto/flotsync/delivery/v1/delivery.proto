syntax = "proto3";

package flotsync.delivery.v1;

import "flotsync/discovery/v1/discovery.proto";
import "flotsync/security/v1/security.proto";

// Group-broadcast-owned inbound endpoint branch.
message GroupBroadcastFrame {
  oneof body {
    GroupEnvelopeWire envelope = 1;
    GroupRelayStoreConfirmationWire relay_store_confirmation = 2;
  }
}

// Reliable-delivery-owned inbound endpoint branch.
message ReliableDeliveryFrame {
  oneof body {
    ReliableEnvelopeWire envelope = 1;
    RecipientAckWire recipient_ack = 2;
    MailboxFetchWire mailbox_fetch = 3;
    MailboxBatchWire mailbox_batch = 4;
    MailboxAckWire mailbox_ack = 5;
    ReliableRelayStoreConfirmationWire relay_store_confirmation = 6;
  }
}

// Public group-envelope routing header.
message GroupEnvelopeHeader {
  bytes group_id = 1;
  flotsync.discovery.v1.Identifier sender = 2;
  bytes message_id = 3;
}

// Payload encrypted under an already established symmetric/pre-shared-key
// context and authenticated with a detached frame signature. The ciphertext is
// required by every PSK frame; signature-only control frames use
// DetachedSignature instead.
message SealedPSKPayload {
  bytes ciphertext = 1;
  bytes signature = 2;
}

// Group fan-out envelope with explicit separation between public routing data
// and sealed payload bytes.
message GroupEnvelopeWire {
  GroupEnvelopeHeader public_header = 1;
  SealedPSKPayload sealed_payload = 16;
}

// Public reliable-envelope routing header.
message ReliableEnvelopeHeader {
  flotsync.discovery.v1.Identifier sender = 1;
  flotsync.discovery.v1.Identifier recipient = 2;
  bytes message_id = 3;
}

// Payload encrypted to one recipient with HPKE and authenticated with a
// detached frame signature. The encapsulated key lets the recipient derive the
// content-encryption key for this message.
message SealedHPKEPayload {
  bytes encapsulated_key = 1;
  bytes ciphertext = 2;
  bytes signature = 3;
}

// Recipient-addressed envelope with explicit separation between public routing
// data and sealed payload bytes.
message ReliableEnvelopeWire {
  ReliableEnvelopeHeader public_header = 1;
  SealedHPKEPayload sealed_payload = 16;
}

// Public recipient-ack routing header.
message RecipientAckHeader {
  bytes message_id = 1;
  flotsync.discovery.v1.Identifier original_sender = 2;
  flotsync.discovery.v1.Identifier recipient = 3;
}

// Recipient-owned completion acknowledgement.
message RecipientAckWire {
  RecipientAckHeader public_header = 1;
  DetachedSignature signature = 16;
}

// Public identity-proof header.
message IdentityProofHeader {
  flotsync.discovery.v1.Identifier signer = 1;
  bytes challenge = 2;
}

// Recipient or relay proof of identity.
message IdentityProofWire {
  IdentityProofHeader public_header = 1;
  DetachedSignature footer = 17;
}

// Public mailbox-fetch routing header.
message MailboxFetchHeader {
  flotsync.discovery.v1.Identifier recipient = 1;
  bytes freshness_token = 2;
}

// Recipient-initiated relay mailbox fetch request.
message MailboxFetchWire {
  MailboxFetchHeader public_header = 1;
  IdentityProofWire proof = 16;
}

// Public mailbox-batch routing header.
message MailboxBatchHeader {
  flotsync.discovery.v1.Identifier recipient = 1;
  flotsync.discovery.v1.Identifier relay = 2;
}

// One mailbox item returned by a relay.
message MailboxItemWire {
  bytes item_id = 1;
  ReliableEnvelopeWire envelope = 2;
}

// Relay mailbox response batch.
message MailboxBatchWire {
  MailboxBatchHeader public_header = 1;
  repeated MailboxItemWire items = 16;
}

// Public mailbox-ack routing header.
message MailboxAckHeader {
  flotsync.discovery.v1.Identifier relay = 1;
  flotsync.discovery.v1.Identifier recipient = 2;
}

// One mailbox-clean-up acknowledgement handle.
message MailboxAckHandleWire {
  oneof handle {
    bytes message_id = 1;
    bytes item_id = 2;
  }
}

// Recipient-issued mailbox clean-up acknowledgement.
message MailboxAckWire {
  MailboxAckHeader public_header = 1;
  repeated MailboxAckHandleWire acknowledgements = 16;
}

// Public group relay-store-confirmation routing header.
message GroupRelayStoreConfirmationHeader {
  bytes group_id = 1;
  bytes message_id = 2;
  flotsync.discovery.v1.Identifier original_sender = 3;
  flotsync.discovery.v1.Identifier relay = 4;
}

// One logical route endpoint reference.
message RouteEndpointWire {
  oneof endpoint {
    flotsync.discovery.v1.Identifier peer = 1;
    flotsync.discovery.v1.Identifier relay = 2;
  }
}

// Relay-issued durable-store proof for a group-broadcast envelope.
message GroupRelayStoreConfirmationWire {
  GroupRelayStoreConfirmationHeader public_header = 1;
  RouteEndpointWire route_id = 16;
  bytes receipt_id = 17;
}

// Public reliable relay-store-confirmation routing header.
message ReliableRelayStoreConfirmationHeader {
  bytes message_id = 1;
  flotsync.discovery.v1.Identifier original_sender = 2;
  flotsync.discovery.v1.Identifier recipient = 3;
  flotsync.discovery.v1.Identifier relay = 4;
}

// Relay-issued durable-store proof for a reliable-delivery envelope.
message ReliableRelayStoreConfirmationWire {
  ReliableRelayStoreConfirmationHeader public_header = 1;
  RouteEndpointWire route_id = 16;
  bytes receipt_id = 17;
}

// Signature-only authentication bytes plus scheme reference. Use this when a
// frame authenticates its public header but carries no encrypted body.
message DetachedSignature {
  flotsync.security.v1.SignatureScheme scheme = 1;
  bytes signature_bytes = 2;
}
