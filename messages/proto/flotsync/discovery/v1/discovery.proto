syntax = "proto3";

package flotsync.discovery.v1;

import "flotsync/security/v1/security.proto";

// A full socket address, specifying protocol, address, and port.
message SocketAddress {
  enum Protocol {
    PROTOCOL_UNSPECIFIED = 0;
    PROTOCOL_UDP = 1;
    PROTOCOL_TCP = 2;
  }

  Protocol protocol = 1;
  IPAddress address = 2;
  uint32 port = 3;
}

// An IP address, either V4 or V6.
message IPAddress {
  oneof address {
    // Exactly 4 bytes.
    bytes ipv4_bytes = 1;
    // Exactly 16 bytes.
    bytes ipv6_bytes = 2;
  }
}

// Broadcast message to announce that a peer that speaks the flotsync protocol
// is operating in this network and can be reached at the addresses listed in the listening_on field.
message Peer {
  // A 16 byte UUID of the current instance of this peer.
  bytes instance_uuid = 1;
  repeated SocketAddress listening_on = 2;
}

// Discovery messages carried on the replication endpoint being verified.
message DiscoveryFrame {
  oneof body {
    IntroductionRequest introduction_request = 1;
    Introduction introduction = 2;
    KeyBundleLookupRequest key_bundle_lookup_request = 3;
    SignedKeyBundleLookupResponse key_bundle_lookup_response = 4;
  }
}

// Request for a peer to identify themselves on the probed route.
//
// Should be answered with an [[Introduction]].
message IntroductionRequest {
  // 16 byte UUID nonce generated by the receiver and included in signed introduction claims.
  bytes request_nonce = 1;
}

// An identification of a peer.
message Introduction {
  // A 16 byte UUID of the current instance of this peer.
  bytes instance_uuid = 1;

  // Echo of the 16 byte UUID nonce from the IntroductionRequest.
  bytes request_nonce = 2;

  // Signed identity and group-membership claims available through this route.
  repeated SignedIntroductionClaim claims = 3;
}

// A hierarchical identifier equivalent to "a.b.c", given as individual segments "a", "b", "c".
message Identifier {
  repeated string segments = 1;
}

// Signature schemes used by discovery identity proofs.
message DiscoverySignature {
  flotsync.security.v1.SignatureScheme scheme = 1;
  bytes signature_bytes = 2;
}

// One introduction claim payload that a route is valid for one or more
// replication groups.
//
// The encoded bytes of this message are signed exactly as transmitted inside
// SignedIntroductionClaim.claim_payload.
message IntroductionClaimPayload {
  // Member identity whose key signs this claim.
  Identifier member_id = 1;

  // Raw 32 byte KeyFingerprint of the signing public key bundle.
  bytes key_fingerprint = 2;

  // A 16 byte UUID of the peer instance making this claim.
  bytes instance_uuid = 3;

  // 16 byte UUID nonce from the IntroductionRequest being answered.
  bytes request_nonce = 4;

  // The exact route endpoint the receiver probed.
  SocketAddress route = 5;

  // A 16 byte UUID for each replication group in this route claim.
  repeated bytes group_ids = 6;
}

// One signed introduction claim.
message SignedIntroductionClaim {
  // Encoded IntroductionClaimPayload bytes. Signatures cover these exact bytes.
  bytes claim_payload = 1;
  DiscoverySignature signature = 2;
}

// Request for a peer's exact public key bundle by member identity and
// fingerprint.
message KeyBundleLookupRequest {
  // Member identity whose public key bundle is requested.
  Identifier member_id = 1;

  // Raw 32 byte KeyFingerprint of the requested public key bundle.
  bytes key_fingerprint = 2;

  // 16 byte UUID nonce generated by the receiver and echoed in the signed response.
  bytes request_nonce = 3;
}

// Signed response to a KeyBundleLookupRequest.
message SignedKeyBundleLookupResponse {
  // Encoded KeyBundleLookupResponsePayload bytes. Signatures cover these exact bytes.
  bytes response_payload = 1;
  DiscoverySignature signature = 2;
}

// Exact public key bundle response payload signed by the returned key.
message KeyBundleLookupResponsePayload {
  // Member identity supplied by the requester.
  Identifier member_id = 1;

  // Raw 32 byte KeyFingerprint requested by the requester.
  bytes key_fingerprint = 2;

  // Echo of the 16 byte UUID nonce from the request.
  bytes request_nonce = 3;

  // Canonical identity-free public key bundle for key_fingerprint.
  flotsync.security.v1.PublicKeyBundle public_key_bundle = 4;
}
