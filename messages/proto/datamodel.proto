syntax = "proto3";

// A concrete update identifier within a fixed replication group.
message HistoryId {
    uint64 version = 1;
    uint32 node_index = 2;
    uint32 chunk_index = 3;
}

// A calendar date stored structurally to avoid timezone conversions.
message Date {
    int32 year = 1;
    uint32 month = 2;
    uint32 day = 3;
}

// Explicit null marker used inside oneof-encoded nullable values.
message NullValue {}

message PrimitiveValue {
    oneof value {
        string string = 1;
        uint64 uint = 2;
        sint64 int = 3;
        uint32 byte = 4;
        double float = 5;
        bool boolean = 6;
        bytes binary = 7;
        Date date = 8;
        sfixed64 timestamp = 9;
    }
}

message StringArrayValue {
    repeated string values = 1;
}

message UIntArrayValue {
    repeated uint64 values = 1;
}

message IntArrayValue {
    repeated sint64 values = 1;
}

message ByteArrayValue {
    bytes values = 1;
}

message FloatArrayValue {
    repeated double values = 1 [packed = true];
}

message BooleanArrayValue {
    repeated bool values = 1 [packed = true];
}

message BinaryArrayValue {
    repeated bytes values = 1;
}

message DateArrayValue {
    repeated Date values = 1;
}

message TimestampArrayValue {
    repeated sfixed64 values = 1 [packed = true];
}

message PrimitiveArrayValue {
    oneof value {
        StringArrayValue string = 1;
        UIntArrayValue uint = 2;
        IntArrayValue int = 3;
        ByteArrayValue byte = 4;
        FloatArrayValue float = 5;
        BooleanArrayValue boolean = 6;
        BinaryArrayValue binary = 7;
        DateArrayValue date = 8;
        TimestampArrayValue timestamp = 9;
    }
}

message BasicValue {
    oneof value {
        PrimitiveValue primitive = 1;
        PrimitiveArrayValue array = 2;
    }
}

message NullableBasicValue {
    oneof value {
        NullValue null = 1;
        PrimitiveValue primitive = 2;
        PrimitiveArrayValue array = 3;
    }
}

message NullablePrimitiveValue {
    oneof value {
        NullValue null = 1;
        PrimitiveValue primitive = 2;
    }
}

message CounterValue {
    oneof value {
        uint32 byte = 1;
        uint64 uint = 2;
    }
}

// A history node shared across all history-backed CRDT snapshot streams.
//
// Interpretation of `HistoryId.chunk_index` and `value` depends on the surrounding field type:
// - LatestValueWins: `HistoryId.chunk_index` differentiates the logical nodes within one update id,
//   such as begin, value, and end nodes.
// - LinearString: `chunk_index` identifies the chunk position and `value` must be a non-null string when present.
// - LinearList: `chunk_index` identifies the chunk position and `value` must be a non-null array when present.
// - Boundary nodes omit `value`; begin/end nodes also omit one side link.
//
// History snapshots intentionally use a split metadata/value layout instead of a simple repeated
// `HistoryNode` message. Benchmarking showed that the row-oriented shape paid substantial per-node
// protobuf overhead, while this layout is materially smaller and faster to encode/decode on the
// workloads we care about. The extra complexity is therefore deliberate transport optimization.
//
// The exact interpretation of `HistorySnapshot.values` depends on the surrounding field schema:
// - `primitive_values` stores scalar/array payloads for non-LinearString histories
// - payloads are consumed sequentially in node order, so `value_offset` is intentionally omitted
// - scalar payloads consume one primitive; array payloads consume `value_len` primitives
// - `string_values` stores concatenated LinearString payloads, sliced by UTF-8 byte lengths
// - explicit nulls use `value_is_null = true` and consume zero buffer entries
// - boundary nodes are identified by a missing side link and must have `value_len = 0`
message HistoryNodeMeta {
    uint64 version = 1;
    uint32 node_index = 2;
    uint32 chunk_index = 3;

    optional uint64 origin_left_version = 4;
    optional uint32 origin_left_node_index = 5;
    optional uint32 origin_left_chunk_index = 6;

    optional uint64 origin_right_version = 7;
    optional uint32 origin_right_node_index = 8;
    optional uint32 origin_right_chunk_index = 9;

    bool deleted = 10;
    uint32 value_len = 11;
    bool value_is_null = 12;
}

message HistorySnapshot {
    repeated HistoryNodeMeta nodes = 1;
    oneof values {
        PrimitiveArrayValue primitive_values = 2;
        string string_values = 3;
    }
}

message SnapshotField {
    string field_name = 1;
    oneof value {
        HistorySnapshot latest_value_wins = 2;
        HistorySnapshot linear_string = 3;
        HistorySnapshot linear_list = 4;
        CounterValue monotonic_counter = 5;
        PrimitiveValue total_order_register = 6;
        NullablePrimitiveValue total_order_finite_state_register = 7;
    }
}

message RowSnapshot {
    repeated SnapshotField fields = 1;
}

message DataSnapshot {
    repeated RowSnapshot rows = 1;
}

message LatestValueWinsOperation {
    HistoryId id = 1;
    HistoryId pred = 2;
    HistoryId succ = 3;
    NullableBasicValue value = 4;
}

message LinearDeleteOperation {
    HistoryId start = 1;
    optional uint32 end_chunk_index = 2;
}

message LinearStringInsertOperation {
    HistoryId id = 1;
    HistoryId pred = 2;
    HistoryId succ = 3;
    string value = 4;
}

message LinearStringAction {
    oneof value {
        LinearStringInsertOperation insert = 1;
        LinearDeleteOperation delete = 2;
    }
}

message LinearStringOperation {
    repeated LinearStringAction actions = 1;
}

message LinearListInsertOperation {
    HistoryId id = 1;
    HistoryId pred = 2;
    HistoryId succ = 3;
    PrimitiveArrayValue value = 4;
}

message LinearListAction {
    oneof value {
        LinearListInsertOperation insert = 1;
        LinearDeleteOperation delete = 2;
    }
}

message LinearListOperation {
    repeated LinearListAction actions = 1;
}

message MonotonicCounterIncrementOperation {
    CounterValue value = 1;
}

message TotalOrderRegisterSetOperation {
    PrimitiveValue value = 1;
}

message TotalOrderFiniteStateRegisterSetOperation {
    NullablePrimitiveValue value = 1;
}

message OperationField {
    string field_name = 1;
    oneof value {
        LatestValueWinsOperation latest_value_wins = 2;
        LinearStringOperation linear_string = 3;
        LinearListOperation linear_list = 4;
        MonotonicCounterIncrementOperation monotonic_counter_increment = 5;
        TotalOrderRegisterSetOperation total_order_register_set = 6;
        TotalOrderFiniteStateRegisterSetOperation total_order_finite_state_register_set = 7;
    }
}

message InsertRowOperation {
    bytes row_id = 1;
    RowSnapshot snapshot = 2;
}

message UpdateRowOperation {
    bytes row_id = 1;
    repeated OperationField fields = 2;
}

message DeleteRowOperation {
    bytes row_id = 1;
}

message SchemaOperation {
    HistoryId change_id = 1;
    oneof operation {
        InsertRowOperation insert = 2;
        UpdateRowOperation update = 3;
        DeleteRowOperation delete = 4;
    }
}

enum PrimitiveType {
    PRIMITIVE_TYPE_UNSPECIFIED = 0;
    PRIMITIVE_TYPE_STRING = 1;
    PRIMITIVE_TYPE_UINT = 2;
    PRIMITIVE_TYPE_INT = 3;
    PRIMITIVE_TYPE_BYTE = 4;
    PRIMITIVE_TYPE_FLOAT = 5;
    PRIMITIVE_TYPE_BOOLEAN = 6;
    PRIMITIVE_TYPE_BINARY = 7;
    PRIMITIVE_TYPE_DATE = 8;
    PRIMITIVE_TYPE_TIMESTAMP = 9;
}

enum Direction {
    DIRECTION_UNSPECIFIED = 0;
    DIRECTION_ASCENDING = 1;
    DIRECTION_DESCENDING = 2;
}

enum ReplicatedDataTypeKind {
    REPLICATED_DATA_TYPE_KIND_UNSPECIFIED = 0;
    REPLICATED_DATA_TYPE_KIND_LATEST_VALUE_WINS = 1;
    REPLICATED_DATA_TYPE_KIND_LINEAR_STRING = 2;
    REPLICATED_DATA_TYPE_KIND_LINEAR_LIST = 3;
    REPLICATED_DATA_TYPE_KIND_MONOTONIC_COUNTER = 4;
    REPLICATED_DATA_TYPE_KIND_TOTAL_ORDER_REGISTER = 5;
    REPLICATED_DATA_TYPE_KIND_TOTAL_ORDER_FINITE_STATE_REGISTER = 6;
}

message BasicDataType {
    oneof value {
        PrimitiveType primitive = 1;
        PrimitiveType primitive_array = 2;
    }
}

message NullableBasicDataType {
    oneof value {
        BasicDataType non_null = 1;
        BasicDataType nullable = 2;
    }
}

message NullablePrimitiveType {
    oneof value {
        PrimitiveType non_null = 1;
        PrimitiveType nullable = 2;
    }
}

// Nullable primitive state list with optional null insertion point.
//
// `null_index` is interpreted relative to `values` after dropping null:
// it may range from 0 to `values.len()` inclusive.
message NullablePrimitiveValueArray {
    PrimitiveArrayValue values = 1;
    optional uint32 null_index = 2;
}

// Details are validated against `kind` by transport codecs.
message ReplicatedDataType {
    ReplicatedDataTypeKind kind = 1;

    oneof detail {
        NullableBasicDataType nullable_basic_value_type = 2;
        PrimitiveType primitive_value_type = 3;
        bool monotonic_counter_small_range = 4;
        NullablePrimitiveValueArray finite_state_states = 5;
    }

    optional Direction total_order_direction = 6;
    NullablePrimitiveType finite_state_value_type = 7;
}

message FieldDefinition {
    string name = 1;
    ReplicatedDataType data_type = 2;
    map<string, string> metadata = 3;
}

message SchemaDefinition {
    repeated FieldDefinition fields = 1;
    map<string, string> metadata = 2;
}
